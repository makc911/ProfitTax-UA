<script type="module">
import React, { useState, useEffect, useMemo, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import {
  BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip,
  ResponsiveContainer, ReferenceLine, LineChart, Line, Legend
} from 'recharts';

const h = React.createElement;

// ═══════════════════════════════════════════════════════════
// SECTION: CONSTANTS
// ═══════════════════════════════════════════════════════════

const UA_TAX_RATES = {
  dividends: { pdfo: 0.09, vz: 0.05 },       // актуальні ставки (з 2025)
  capitalGains: { pdfo: 0.18, vz: 0.05 },
};

/**
 * Військовий збір: 1.5% по 2024 рік включно, 5% з 2025 року.
 * Закон №4015-IX підвищив ставку з 01.12.2024, але для доходів, що декларуються
 * фізособами самостійно за підсумками року, діє спецпорядок переходу:
 *   — Доходи 2024 року → ВЗ 1.5% (незалежно від місяця)
 *   — Доходи з 01.01.2025 → ВЗ 5%
 */
const VZ_RATE_CHANGE_DATE = '2025-01-01';
const VZ_RATE_OLD = 0.015;
const VZ_RATE_NEW = 0.05;

function getVzRateForDate(dateISO) {
  return (dateISO && dateISO < VZ_RATE_CHANGE_DATE) ? VZ_RATE_OLD : VZ_RATE_NEW;
}

function getVzRateForYear(year) {
  // Для капгейну — ставка за рік звіту (NET-прибуток за рік)
  return (year && year <= 2024) ? VZ_RATE_OLD : VZ_RATE_NEW;
}

const NBU_API = 'https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange';

const CHART_COLORS = ['#7986ef', '#34d399', '#fbbf24', '#f87171', '#a78bfa', '#22d3ee', '#ec4899', '#6ee7b7', '#fb923c', '#818cf8', '#2dd4bf', '#fda4af'];

// ═══════════════════════════════════════════════════════════
// SECTION: XML_PARSER (IBKR Flex Query)
// ═══════════════════════════════════════════════════════════

function parseIBKRXml(xmlString) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlString, 'text/xml');
  const parseErr = doc.querySelector('parsererror');
  if (parseErr) throw new Error('Помилка парсингу XML: ' + parseErr.textContent.slice(0, 200));
  const root = doc.querySelector('FlexQueryResponse');
  if (!root) throw new Error('Це не IBKR Flex Query XML (немає FlexQueryResponse)');

  const meta = {
    queryName: root.getAttribute('queryName') || '',
    type: root.getAttribute('type') || '',
  };
  const accounts = [];
  doc.querySelectorAll('FlexStatement').forEach((stmt) => {
    const acc = {
      accountId: stmt.getAttribute('accountId') || '',
      fromDate: ibkrDateToISO(stmt.getAttribute('fromDate')),
      toDate: ibkrDateToISO(stmt.getAttribute('toDate')),
      whenGenerated: stmt.getAttribute('whenGenerated') || '',
      lots: [],
      cashTransactions: [],
    };
    stmt.querySelectorAll('Trades > Lot').forEach((lot) => {
      const attrs = {};
      for (const a of lot.attributes) attrs[a.name] = a.value;
      acc.lots.push(normalizeLot(attrs));
    });
    stmt.querySelectorAll('CashTransactions > CashTransaction').forEach((ct) => {
      const attrs = {};
      for (const a of ct.attributes) attrs[a.name] = a.value;
      acc.cashTransactions.push(normalizeCash(attrs));
    });
    accounts.push(acc);
  });
  return { meta, accounts };
}

function normalizeLot(a) {
  return {
    ...a,
    quantity: parseFloat(a.quantity) || 0,
    tradePrice: parseFloat(a.tradePrice) || 0,
    cost: parseFloat(a.cost) || 0,
    fifoPnlRealized: parseFloat(a.fifoPnlRealized) || 0,
    fxRateToBase: parseFloat(a.fxRateToBase) || 1,
    tradeDateISO: ibkrDateToISO(a.tradeDate),
    dateTimeISO: ibkrDateToISO(a.dateTime),
    openDateTimeISO: ibkrDateToISO(a.openDateTime),
    reportDateISO: ibkrDateToISO(a.reportDate),
  };
}

function normalizeCash(a) {
  return {
    ...a,
    amount: parseFloat(a.amount) || 0,
    fxRateToBase: parseFloat(a.fxRateToBase) || 1,
    dateTimeISO: ibkrDateToISO(a.dateTime),
    settleDateISO: ibkrDateToISO(a.settleDate),
    exDateISO: ibkrDateToISO(a.exDate),
    reportDateISO: ibkrDateToISO(a.reportDate),
  };
}

function ibkrDateToISO(s) {
  if (!s) return '';
  const str = String(s).trim();
  if (!str) return '';
  const datePart = str.split(';')[0];
  if (datePart.length === 8 && /^\d+$/.test(datePart)) {
    return `${datePart.slice(0, 4)}-${datePart.slice(4, 6)}-${datePart.slice(6, 8)}`;
  }
  return str;
}

// ═══════════════════════════════════════════════════════════
// SECTION: CLASSIFIER (Dividends + WHT grouping + ROC)
// ═══════════════════════════════════════════════════════════

function classifyTransactions(parsed) {
  // Ключ "виплати" з description: пов'язує Dividend ↔ його Withholding,
  // навіть коли в один день по тикеру кілька різних виплат (Ordinary + Cap Gain).
  const makeDistKey = (symbol, desc) => {
    const s = String(desc || '');
    const m = s.match(/(USD?\s+[\d.]+)\s+PER\s+SHARE/i);
    return `${symbol}|${m ? m[1].replace(/\s+/g, ' ') : 'unknown'}`;
  };

  const accounts = parsed.accounts.map((acc) => {
    const dividends = acc.cashTransactions.filter((c) => c.type === 'Dividends');
    const whtAll = acc.cashTransactions.filter((c) => c.type === 'Withholding Tax');
    const other = acc.cashTransactions.filter(
      (c) => c.type !== 'Dividends' && c.type !== 'Withholding Tax'
    );
    const whtByKey = new Map();
    whtAll.forEach((w) => {
      const key = makeDistKey(w.symbol, w.description);
      if (!whtByKey.has(key)) whtByKey.set(key, []);
      whtByKey.get(key).push(w);
    });
    const enrichedDividends = dividends.map((div) => {
      const key = makeDistKey(div.symbol, div.description);
      const relatedWHT = whtByKey.get(key) || [];
      const whtNegSum = relatedWHT.filter((w) => w.amount < 0).reduce((s, w) => s + w.amount, 0);
      const whtPosSum = relatedWHT.filter((w) => w.amount > 0).reduce((s, w) => s + w.amount, 0);
      const whtNet = whtNegSum + whtPosSum;           // нетто після ROC-реверсій
      const whtGrossUSD = Math.abs(whtNegSum);        // повна сума утримання в США (для відображення)
      const rocReceivedUSD = whtPosSum;               // позитивна реверсія = фактично повернутий капітал
      const rocReversedUSD = Math.min(whtGrossUSD, whtPosSum); // скільки саме утримання було "перекласифіковано"
      return {
        ...div,
        grossUSD: div.amount,
        relatedWHT,
        whtWithheldUSD: whtNegSum,   // від'ємне, для сумісності
        whtReversedUSD: whtPosSum,   // для сумісності
        whtGrossUSD,                 // ← НОВЕ: повна сума утримання (для WHT cur у таблиці)
        whtNetUSD: whtNet,           // нетто — для податкового credit в агресивному режимі
        rocReceivedUSD,              // ← НОВЕ: реально повернуто на рахунок (для ROC колонки, Net cur, Чистий дохід)
        rocReversedUSD,
        hasROC: whtPosSum > 0.001,
      };
    });
    return {
      ...acc,
      classified: {
        dividends: enrichedDividends,
        withholdings: whtAll,
        other,
        trades: acc.lots,
      },
    };
  });
  return { ...parsed, accounts };
}

// ═══════════════════════════════════════════════════════════
// SECTION: NBU_RATES (IndexedDB cache + fetch)
// ═══════════════════════════════════════════════════════════

const CACHE_DB_NAME = 'ibkr-tax-ua';
const CACHE_STORE = 'nbu_rates';

function openCache() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(CACHE_DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(CACHE_STORE)) {
        db.createObjectStore(CACHE_STORE, { keyPath: 'key' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function getCachedRate(currency, dateISO) {
  try {
    const db = await openCache();
    return new Promise((resolve) => {
      const tx = db.transaction(CACHE_STORE, 'readonly');
      const store = tx.objectStore(CACHE_STORE);
      const req = store.get(`${currency}_${dateISO}`);
      req.onsuccess = () => resolve(req.result ? req.result.rate : null);
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}

async function setCachedRate(currency, dateISO, rate) {
  try {
    const db = await openCache();
    const tx = db.transaction(CACHE_STORE, 'readwrite');
    tx.objectStore(CACHE_STORE).put({ key: `${currency}_${dateISO}`, rate, currency, date: dateISO });
  } catch {}
}

async function clearRateCache() {
  try {
    const db = await openCache();
    const tx = db.transaction(CACHE_STORE, 'readwrite');
    tx.objectStore(CACHE_STORE).clear();
  } catch {}
}

async function fetchNBURate(currency, dateISO) {
  const d = dateISO.replace(/-/g, '');
  const url = `${NBU_API}?valcode=${currency}&date=${d}&json`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`NBU API: ${resp.status}`);
  const data = await resp.json();
  if (!Array.isArray(data) || data.length === 0) return null;
  return data[0].rate;
}

async function getRate(currency, dateISO, { useCache = true } = {}) {
  if (!currency || !dateISO) return null;
  if (currency === 'UAH') return 1;
  if (useCache) {
    const cached = await getCachedRate(currency, dateISO);
    if (cached != null) return cached;
  }
  let d = new Date(dateISO + 'T12:00:00Z');
  for (let i = 0; i < 10; i++) {
    const tryISO = d.toISOString().slice(0, 10);
    try {
      const r = await fetchNBURate(currency, tryISO);
      if (r != null) {
        await setCachedRate(currency, dateISO, r);
        return r;
      }
    } catch (e) {}
    d.setUTCDate(d.getUTCDate() - 1);
  }
  return null;
}

async function setCachedRatesBulk(entries) {
  try {
    const db = await openCache();
    return new Promise((resolve) => {
      const tx = db.transaction(CACHE_STORE, 'readwrite');
      const store = tx.objectStore(CACHE_STORE);
      entries.forEach((e) => store.put({
        key: `${e.currency}_${e.date}`,
        currency: e.currency, date: e.date, rate: e.rate
      }));
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch {}
}

/**
 * Статус кешу по валютах: { USD: {min, max, count}, EUR: {...} }
 */
async function getCacheCoverage() {
  try {
    const db = await openCache();
    return new Promise((resolve) => {
      const tx = db.transaction(CACHE_STORE, 'readonly');
      const store = tx.objectStore(CACHE_STORE);
      const req = store.openCursor();
      const cov = {};
      req.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          const { currency, date } = cursor.value;
          if (!cov[currency]) cov[currency] = { min: date, max: date, count: 1 };
          else {
            cov[currency].count++;
            if (date < cov[currency].min) cov[currency].min = date;
            if (date > cov[currency].max) cov[currency].max = date;
          }
          cursor.continue();
        } else resolve(cov);
      };
      req.onerror = () => resolve({});
    });
  } catch { return {}; }
}

async function getCachedRatesRange(currency, startISO, endISO) {
  try {
    const db = await openCache();
    return new Promise((resolve) => {
      const tx = db.transaction(CACHE_STORE, 'readonly');
      const store = tx.objectStore(CACHE_STORE);
      const req = store.openCursor();
      const out = new Map();
      req.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          const v = cursor.value;
          if (v.currency === currency && v.date >= startISO && v.date <= endISO) {
            out.set(v.date, v.rate);
          }
          cursor.continue();
        } else resolve(out);
      };
      req.onerror = () => resolve(new Map());
    });
  } catch { return new Map(); }
}

/**
 * Перелік робочих днів (Mon-Fri) у діапазоні startISO..endISO включно.
 */
function workingDaysInRange(startISO, endISO) {
  const out = [];
  const d = new Date(startISO + 'T12:00:00Z');
  const end = new Date(endISO + 'T12:00:00Z');
  while (d <= end) {
    const dow = d.getUTCDay();
    if (dow !== 0 && dow !== 6) out.push(d.toISOString().slice(0, 10));
    d.setUTCDate(d.getUTCDate() + 1);
  }
  return out;
}

/**
 * Завантаження курсів валюти за період: cache-first, fetch ТІЛЬКИ відсутніх днів.
 * Використовує CORS-friendly per-day endpoint /NBUStatService/.../exchange?valcode=CCY&date=YYYYMMDD&json
 * паралельно батчами по 8 запитів.
 *
 * Повертає { rates: Map<dateISO, rate>, tried, fetched, failed }.
 */
async function loadRatesForCurrency(currency, startISO, endISO, onBatchProgress) {
  if (currency === 'UAH') return { rates: new Map(), tried: 0, fetched: 0, failed: 0 };
  const cached = await getCachedRatesRange(currency, startISO, endISO);
  const workDays = workingDaysInRange(startISO, endISO);
  const missing = workDays.filter((d) => !cached.has(d));
  const out = new Map(cached);
  let fetched = 0, failed = 0;
  const BATCH = 8;
  for (let i = 0; i < missing.length; i += BATCH) {
    const batch = missing.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(async (dateISO) => {
      try {
        const r = await fetchNBURate(currency, dateISO);
        return { dateISO, rate: r };
      } catch { return { dateISO, rate: null }; }
    }));
    const toCache = [];
    results.forEach(({ dateISO, rate }) => {
      if (rate != null) {
        out.set(dateISO, rate);
        toCache.push({ currency, date: dateISO, rate });
        fetched++;
      } else failed++;
    });
    if (toCache.length) await setCachedRatesBulk(toCache);
    if (onBatchProgress) onBatchProgress(currency, Math.min(i + BATCH, missing.length), missing.length);
  }
  return { rates: out, tried: missing.length, fetched, failed };
}

/**
 * Bulk-завантаження для набору валют за період.
 * Повертає { flat, byCcy, diagnostics } — останнє потрібне для показу статусу користувачу.
 */
async function bulkLoadRates(currencies, startISO, endISO, onProgress) {
  const result = new Map();
  const byCcy = new Map();
  const diagnostics = { byCurrency: {}, totalFailed: 0, totalFetched: 0, anyError: false };
  for (let i = 0; i < currencies.length; i++) {
    const ccy = currencies[i];
    try {
      if (onProgress) onProgress(ccy, 0, 0, i + 1, currencies.length);
      const { rates, tried, fetched, failed } = await loadRatesForCurrency(ccy, startISO, endISO,
        (c, done, total) => { if (onProgress) onProgress(c, done, total, i + 1, currencies.length); }
      );
      byCcy.set(ccy, rates);
      rates.forEach((rate, date) => result.set(`${ccy}_${date}`, rate));
      diagnostics.byCurrency[ccy] = { tried, fetched, failed, cached: rates.size };
      diagnostics.totalFetched += fetched;
      diagnostics.totalFailed += failed;
      if (failed > 0) diagnostics.anyError = true;
    } catch (e) {
      console.error(`NBU ${ccy}:`, e);
      diagnostics.byCurrency[ccy] = { tried: 0, fetched: 0, failed: -1, cached: 0, error: e.message };
      diagnostics.anyError = true;
    }
  }
  return { flat: result, byCcy, diagnostics };
}

/**
 * Ефективний курс: точний день або walk-back до 10 днів для вихідних/свят.
 */
function effectiveRate(flatMap, currency, dateISO) {
  if (!currency || !dateISO) return null;
  if (currency === 'UAH') return 1;
  const direct = flatMap.get(`${currency}_${dateISO}`);
  if (direct != null) return direct;
  let d = new Date(dateISO + 'T12:00:00Z');
  for (let i = 0; i < 10; i++) {
    d.setUTCDate(d.getUTCDate() - 1);
    const iso = d.toISOString().slice(0, 10);
    const r = flatMap.get(`${currency}_${iso}`);
    if (r != null) return r;
  }
  return null;
}

// SECTION: TAX_ENGINE
// ═══════════════════════════════════════════════════════════

/**
 * Розрахунок податку по одному дивіденду
 * settings:
 *   usWhtMode: 'conservative' | 'aggressive'
 *
 * База оподаткування = Gross (завжди, згідно з ПКУ).
 * ROC не впливає на базу, не зменшує WHT, показується окремо як повернення капіталу.
 */
function calcDividendTax(div, rate, settings) {
  const currency = div.currency || 'USD';
  const grossUSD = div.grossUSD;
  const whtGrossUSD = div.whtGrossUSD || 0;      // повна сума утримання США
  const rocReceivedUSD = div.rocReceivedUSD || 0; // повернення капіталу (ROC)
  const whtNetUSD = Math.abs(div.whtNetUSD || 0); // нетто — для credit у агресивному режимі

  const grossUAH = grossUSD * (rate || 0);
  const whtGrossUAH = whtGrossUSD * (rate || 0);
  const rocReceivedUAH = rocReceivedUSD * (rate || 0);
  const whtNetUAH = whtNetUSD * (rate || 0);

  // База = Gross (ROC не зменшує базу — ПКУ не розмежовує типи виплат у класі "дивіденди іноземні")
  const baseUAH = grossUAH;
  const pdfo9UAH = baseUAH * UA_TAX_RATES.dividends.pdfo;
  // ВЗ: 1.5% по 2024 рік, 5% з 2025 року — за датою виплати дивіденду
  const vzRate = getVzRateForDate(div.date);
  const vz5UAH = baseUAH * vzRate;

  let pdfoToPayUAH, vzToPayUAH, creditUAH;
  if (settings.usWhtMode === 'aggressive') {
    // Credit — на суму фактично утриманого (нетто після ROC-реверсії), бо ROC це не податок
    creditUAH = Math.min(pdfo9UAH, whtNetUAH);
    pdfoToPayUAH = Math.max(0, pdfo9UAH - creditUAH);
    vzToPayUAH = vz5UAH;
  } else {
    creditUAH = 0;
    pdfoToPayUAH = pdfo9UAH;
    vzToPayUAH = vz5UAH;
  }

  const totalTaxUAH = pdfoToPayUAH + vzToPayUAH;
  // Фактично отримано на рахунок: gross − повне утримання + ROC − UA податок
  const netReceivedUAH = grossUAH - whtGrossUAH + rocReceivedUAH - totalTaxUAH;

  return {
    currency, rate,
    grossUSD, grossUAH,
    baseUSD: grossUSD,                        // для сумісності
    baseUAH,                                  // = grossUAH завжди
    whtGrossUSD, whtGrossUAH,                 // ПОВНА сума утримання (для колонки WHT cur)
    rocReceivedUSD, rocReceivedUAH,           // ROC (для колонки ROC)
    // Для сумісності зі старим кодом і Dashboard:
    usWhtUSD: whtGrossUSD,                    // тепер це ПОВНА сума (раніше була нетто)
    usWhtUAH: whtGrossUAH,
    rocReversedUSD: rocReceivedUSD,           // alias для старих місць що це використовують
    pdfo9UAH, vz5UAH, vzRate,
    creditUAH,
    pdfoToPayUAH, vzToPayUAH, totalTaxUAH, netReceivedUAH,
  };
}

/**
 * Розрахунок P&L для одного лоту (закрита позиція)
 *
 * IBKR Flex Lot (CLOSED_LOT) поля:
 *   cost            = invested sum (купівля, комісії включені в ціну)
 *   tradePrice      = ціна ВІДКРИТТЯ (купівлі) ← не закриття!
 *   fifoPnlRealized = realized P&L USD
 *   Обчислюємо: proceeds = cost + fifoPnl; priceClose = proceeds / qty
 */
function calcCapitalGain(lot, openRate, closeRate) {
  const qty = lot.quantity;
  const priceOpenUSD = lot.tradePrice;
  const costUSD = lot.cost;
  const pnlUSD = lot.fifoPnlRealized;
  const proceedsUSD = costUSD + pnlUSD;
  const priceCloseUSD = qty ? (proceedsUSD / qty) : 0;
  const costBasisUAH = costUSD * (openRate || 0);
  const proceedsUAH = proceedsUSD * (closeRate || 0);
  const pnlUAH = proceedsUAH - costBasisUAH;
  return {
    qty, priceOpenUSD, priceCloseUSD, costUSD, proceedsUSD,
    openRate, closeRate, costBasisUAH, proceedsUAH,
    pnlUSD, pnlUAH,
    isProfit: pnlUAH > 0,
  };
}

/**
 * Master: розрахунок всіх дивідендів і угод
 */
function calculateAll(classified, rateMap, settings) {
  const dividendsOut = [];
  const tradesOut = [];

  for (const acc of classified.accounts) {
    for (const div of acc.classified.dividends) {
      const currency = div.currency || 'USD';
      const dateKey = div.settleDateISO || div.dateTimeISO;
      const rate = effectiveRate(rateMap, currency, dateKey);
      const calc = calcDividendTax(div, rate, settings);
      dividendsOut.push({
        accountId: acc.accountId,
        symbol: div.symbol,
        date: dateKey,
        description: div.description,
        hasROC: div.hasROC,
        transactionID: div.transactionID,
        ...calc,
      });
    }
    for (const lot of acc.classified.trades) {
      const currency = lot.currency || 'USD';
      const closeDateKey = lot.tradeDateISO;
      const openDateKey = lot.openDateTimeISO;
      const openRate = effectiveRate(rateMap, currency, openDateKey);
      const closeRate = effectiveRate(rateMap, currency, closeDateKey);
      const calc = calcCapitalGain(lot, openRate, closeRate);
      tradesOut.push({
        accountId: acc.accountId,
        symbol: lot.symbol,
        currency,
        buySell: lot.buySell,
        openDate: openDateKey,
        closeDate: closeDateKey,
        description: lot.description,
        transactionID: lot.transactionID,
        exchange: lot.exchange,
        ...calc,
      });
    }
  }
  return { dividends: dividendsOut, trades: tradesOut };
}

/**
 * Агрегати для дашборду.
 * Інвестприбуток: податок = max(0, netPnL − priorLoss) × 23%
 */
function buildAggregates(calc, settings) {
  const reportYear = settings?.reportYear;
  const inYear = (iso) => !iso || !reportYear || iso.slice(0, 4) === String(reportYear);

  const divs = calc.dividends.filter((d) => inYear(d.date));
  const trades = calc.trades.filter((t) => inYear(t.closeDate));

  const tradesPnlUSD_val = trades.reduce((s, t) => s + t.pnlUSD, 0);
  const tradesPnlUAH_val = trades.reduce((s, t) => s + t.pnlUAH, 0);
  const tradesProfitUAH_val = trades.filter(t => t.pnlUAH > 0).reduce((s, t) => s + t.pnlUAH, 0);
  const tradesLossUAH_val = trades.filter(t => t.pnlUAH < 0).reduce((s, t) => s + t.pnlUAH, 0);
  const priorLoss = Math.max(0, settings?.priorLossUAH || 0);
  const taxableBaseUAH = Math.max(0, tradesPnlUAH_val - priorLoss);
  const tradesPdfoUAH_val = taxableBaseUAH * UA_TAX_RATES.capitalGains.pdfo;
  // ВЗ за роком звіту: 1.5% для 2024 і раніше, 5% для 2025+
  const tradesVzRate = getVzRateForYear(reportYear);
  const tradesVzUAH_val = taxableBaseUAH * tradesVzRate;
  const tradesTaxUAH_val = tradesPdfoUAH_val + tradesVzUAH_val;
  const lossCarryForwardUAH = tradesPnlUAH_val < 0 ? Math.abs(tradesPnlUAH_val) : 0;
  const priorLossUsedUAH = tradesPnlUAH_val > 0 ? Math.min(priorLoss, tradesPnlUAH_val) : 0;
  const priorLossRemainingUAH = Math.max(0, priorLoss - priorLossUsedUAH);

  // Чи є в звітному періоді дивіденди до зміни ставки ВЗ і після
  const divsOldVz = divs.filter(d => d.vzRate === VZ_RATE_OLD);
  const divsNewVz = divs.filter(d => d.vzRate === VZ_RATE_NEW);
  const dividendsVzMixed = divsOldVz.length > 0 && divsNewVz.length > 0;
  const dividendsVzRate = divsOldVz.length > divsNewVz.length ? VZ_RATE_OLD : VZ_RATE_NEW;

  const totals = {
    grossDividendsUSD: divs.reduce((s, d) => s + d.grossUSD, 0),
    grossDividendsUAH: divs.reduce((s, d) => s + d.grossUAH, 0),
    baseDividendsUAH: divs.reduce((s, d) => s + d.baseUAH, 0),
    usWhtUSD: divs.reduce((s, d) => s + d.usWhtUSD, 0),
    usWhtUAH: divs.reduce((s, d) => s + d.usWhtUAH, 0),
    dividendsPdfoUAH: divs.reduce((s, d) => s + d.pdfoToPayUAH, 0),
    dividendsVzUAH: divs.reduce((s, d) => s + d.vzToPayUAH, 0),
    dividendsVzRate,                           // переважаюча ставка (для лейблу)
    dividendsVzMixed,                          // чи змішаний період
    dividendsVzOldUAH: divsOldVz.reduce((s, d) => s + d.vzToPayUAH, 0),
    dividendsVzNewUAH: divsNewVz.reduce((s, d) => s + d.vzToPayUAH, 0),
    dividendsTaxUAH: divs.reduce((s, d) => s + d.totalTaxUAH, 0),
    dividendsNetUAH: divs.reduce((s, d) => s + d.netReceivedUAH, 0),

    tradesPnlUSD: tradesPnlUSD_val,
    tradesPnlUAH: tradesPnlUAH_val,
    tradesProfitUAH: tradesProfitUAH_val,
    tradesLossUAH: tradesLossUAH_val,
    taxableBaseUAH,
    priorLossUsedUAH,
    priorLossRemainingUAH,
    lossCarryForwardUAH,
    tradesPdfoUAH: tradesPdfoUAH_val,
    tradesVzUAH: tradesVzUAH_val,
    tradesVzRate,                              // 0.015 або 0.05 — для відображення в UI
    tradesTaxUAH: tradesTaxUAH_val,
  };
  totals.totalTaxUAH = totals.dividendsTaxUAH + totals.tradesTaxUAH;

  // By-account
  const byAccount = {};
  divs.forEach((d) => {
    if (!byAccount[d.accountId]) byAccount[d.accountId] = { account: d.accountId, divGross: 0, divTax: 0, tradePnl: 0 };
    byAccount[d.accountId].divGross += d.grossUAH;
    byAccount[d.accountId].divTax += d.totalTaxUAH;
  });
  trades.forEach((t) => {
    if (!byAccount[t.accountId]) byAccount[t.accountId] = { account: t.accountId, divGross: 0, divTax: 0, tradePnl: 0 };
    byAccount[t.accountId].tradePnl += t.pnlUAH;
  });

  // By symbol
  const divBySymbol = {};
  divs.forEach((d) => {
    if (!divBySymbol[d.symbol]) divBySymbol[d.symbol] = {
      symbol: d.symbol, grossUAH: 0, grossCurrency: 0, currency: d.currency || 'USD', taxUAH: 0, netUAH: 0, count: 0
    };
    divBySymbol[d.symbol].grossUAH += d.grossUAH;
    divBySymbol[d.symbol].grossCurrency += d.grossUSD;
    divBySymbol[d.symbol].taxUAH += d.totalTaxUAH;
    divBySymbol[d.symbol].netUAH += d.netReceivedUAH;
    divBySymbol[d.symbol].count += 1;
  });
  const tradesBySymbol = {};
  trades.forEach((t) => {
    if (!tradesBySymbol[t.symbol]) tradesBySymbol[t.symbol] = {
      symbol: t.symbol, pnlUAH: 0, pnlCurrency: 0,
      costUAH: 0, costCurrency: 0,
      currency: t.currency || 'USD', count: 0
    };
    tradesBySymbol[t.symbol].pnlUAH += t.pnlUAH;
    tradesBySymbol[t.symbol].pnlCurrency += t.pnlUSD;
    tradesBySymbol[t.symbol].costUAH += t.costBasisUAH;
    tradesBySymbol[t.symbol].costCurrency += t.costUSD;
    tradesBySymbol[t.symbol].count += 1;
  });

  // By currency (для KPI розбивки, tooltip'ів та Підсумку)
  const divByCurrency = {};
  divs.forEach((d) => {
    const c = d.currency || 'USD';
    if (!divByCurrency[c]) divByCurrency[c] = {
      currency: c, grossCurrency: 0, grossUAH: 0,
      whtCurrency: 0, whtUAH: 0,
      rocCurrency: 0, rocUAH: 0,
      netCurrency: 0, netUAH: 0,
      count: 0
    };
    divByCurrency[c].grossCurrency += d.grossUSD;
    divByCurrency[c].grossUAH += d.grossUAH;
    divByCurrency[c].whtCurrency += (d.whtGrossUSD || 0);
    divByCurrency[c].whtUAH += (d.whtGrossUAH || 0);
    divByCurrency[c].rocCurrency += (d.rocReceivedUSD || 0);
    divByCurrency[c].rocUAH += (d.rocReceivedUAH || 0);
    // Net cur = Gross − повне WHT + ROC (фактично отримано у валюті на рахунок)
    divByCurrency[c].netCurrency += (d.grossUSD - (d.whtGrossUSD || 0) + (d.rocReceivedUSD || 0));
    divByCurrency[c].netUAH += (d.grossUAH - (d.whtGrossUAH || 0) + (d.rocReceivedUAH || 0));
    divByCurrency[c].count += 1;
  });
  const tradesByCurrency = {};
  trades.forEach((t) => {
    const c = t.currency || 'USD';
    if (!tradesByCurrency[c]) tradesByCurrency[c] = {
      currency: c, pnlCurrency: 0, pnlUAH: 0,
      costCurrency: 0, costUAH: 0,
      count: 0
    };
    tradesByCurrency[c].pnlCurrency += t.pnlUSD;
    tradesByCurrency[c].pnlUAH += t.pnlUAH;
    tradesByCurrency[c].costCurrency += t.costUSD;
    tradesByCurrency[c].costUAH += t.costBasisUAH;
    tradesByCurrency[c].count += 1;
  });

  // Monthly (з сумою у валюті для tooltip)
  const monthly = {};
  divs.forEach((d) => {
    const ym = d.date.slice(0, 7);
    if (!monthly[ym]) monthly[ym] = { month: ym, grossUAH: 0, grossUSD: 0, taxUAH: 0 };
    monthly[ym].grossUAH += d.grossUAH;
    monthly[ym].grossUSD += d.grossUSD;
    monthly[ym].taxUAH += d.totalTaxUAH;
  });
  const monthlyArr = Object.values(monthly).sort((a, b) => a.month.localeCompare(b.month));

  return {
    totals,
    byAccount: Object.values(byAccount),
    divBySymbol: Object.values(divBySymbol).sort((a, b) => b.grossUAH - a.grossUAH),
    tradesBySymbol: Object.values(tradesBySymbol).sort((a, b) => Math.abs(b.pnlUAH) - Math.abs(a.pnlUAH)),
    divByCurrency: Object.values(divByCurrency),
    tradesByCurrency: Object.values(tradesByCurrency),
    monthly: monthlyArr,
    reportYear,
    divs, trades,
  };
}

function fmtNum(v, dec = 2) {
  if (v == null || Number.isNaN(v)) return '—';
  const abs = Math.abs(v);
  const parts = abs.toFixed(dec).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  const s = parts.join(',');
  return v < 0 ? '−' + s : s;
}
function fmtUAH(v, dec = 2) { return v == null ? '—' : `${fmtNum(v, dec)} ₴`; }
function fmtUSD(v, dec = 2) { return v == null ? '—' : `$${fmtNum(v, dec)}`; }
function fmtCur(v, currency = 'USD', dec = 2) {
  if (v == null) return '—';
  const symbols = { USD: '$', EUR: '€', GBP: '£', CHF: 'Fr', PLN: 'zł' };
  const sym = symbols[currency] || '';
  const num = fmtNum(v, dec);
  return sym ? `${sym}${num.startsWith('−') ? num.replace('−', '−') : num}` : `${num} ${currency}`;
}

/**
 * Будує дані для графіка курсів: масив об'єктів { date, USD, EUR, ... }
 * на кожен день у діапазоні (walk-back для вихідних/свят).
 */
function buildRateChartData(rateMap, currencies, startISO, endISO) {
  if (!rateMap || !startISO || !endISO || !currencies || currencies.length === 0) return [];
  const result = [];
  const d = new Date(startISO + 'T12:00:00Z');
  const end = new Date(endISO + 'T12:00:00Z');
  // Кількість точок — по робочих днях (щоб не було "ступінчастих" ліній на вих-дні)
  while (d <= end) {
    const dayOfWeek = d.getUTCDay();
    // 0=Sunday, 6=Saturday — пропускаємо вихідні (курс НБУ не оновлюється)
    if (dayOfWeek !== 0 && dayOfWeek !== 6) {
      const iso = d.toISOString().slice(0, 10);
      const row = { date: iso };
      let anyValue = false;
      currencies.forEach((c) => {
        const rate = effectiveRate(rateMap, c, iso);
        if (rate != null) { row[c] = rate; anyValue = true; }
      });
      if (anyValue) result.push(row);
    }
    d.setUTCDate(d.getUTCDate() + 1);
  }
  return result;
}

function fmtVzRate(rate) {
  // 0.015 → "1,5%", 0.05 → "5%"
  return rate === VZ_RATE_OLD ? '1,5%' : '5%';
}

function fmtDateDDMMYYYY(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  if (!y || !m || !d) return iso;
  return `${d}.${m}.${y}`;
}

function fmtDateDDMMYY(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  if (!y || !m || !d) return iso;
  return `${d}.${m}.${y.slice(2)}`;
}

function TabButton({ active, onClick, children, badge }) {
  return h('button', {
    onClick,
    className: 'relative px-4 py-2 text-sm font-medium rounded-lg transition-all',
    style: {
      background: active ? 'var(--bg-panel-2)' : 'transparent',
      color: active ? 'var(--text-primary)' : 'var(--text-tertiary)',
    },
    onMouseEnter: (e) => { if (!active) { e.currentTarget.style.color = 'var(--text-primary)'; e.currentTarget.style.background = 'var(--bg-panel-2)'; } },
    onMouseLeave: (e) => { if (!active) { e.currentTarget.style.color = 'var(--text-tertiary)'; e.currentTarget.style.background = 'transparent'; } },
  },
    children,
    badge != null && h('span', {
      className: 'ml-2 text-[10px] px-1.5 py-0.5 rounded-md',
      style: {
        background: active ? 'var(--accent-bg)' : 'var(--bg-panel-3)',
        color: active ? 'var(--accent)' : 'var(--text-tertiary)',
      }
    }, badge)
  );
}

function KPI({ label, value, sub, tone = 'neutral' }) {
  const toneColor = {
    neutral: 'var(--text-primary)',
    positive: 'var(--pos-soft)',
    negative: 'var(--neg-soft)',
    accent: 'var(--accent)',
    warn: 'var(--warn)',
  }[tone];
  return h('div', { className: 'card card-hover p-5' },
    h('div', { className: 'text-[11px] uppercase tracking-wider t-text-tertiary mb-2' }, label),
    h('div', {
      className: 'text-2xl font-mono font-medium num-animate',
      style: { color: toneColor }
    }, value),
    sub && h('div', { className: 't-text-tertiary text-xs mt-1.5' }, sub)
  );
}

function ThemeToggle({ theme, setTheme }) {
  const toggle = () => setTheme(theme === 'dark' ? 'light' : 'dark');
  return h('button', {
    onClick: toggle,
    className: 'flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm transition-colors',
    style: {
      background: 'var(--bg-panel-2)',
      border: '1px solid var(--border-subtle)',
      color: 'var(--text-secondary)',
    },
    onMouseEnter: (e) => { e.currentTarget.style.color = 'var(--text-primary)'; },
    onMouseLeave: (e) => { e.currentTarget.style.color = 'var(--text-secondary)'; },
    title: 'Перемкнути тему'
  },
    theme === 'dark'
      ? h('span', null, '☀ Light')
      : h('span', null, '☾ Dark')
  );
}

// SECTION: TAB_UPLOAD
// ═══════════════════════════════════════════════════════════

function UploadTab({
  onFileLoaded, parseError, xmlLoaded,
  loadingStatus, loadingStatusKind,
  onClearCache, settings, setSettings,
  reportDateRange, reportYears,
  cacheCoverage, reportCurrencies,
}) {
  const [dragActive, setDragActive] = useState(false);
  const dragCounter = useRef(0);
  const inputRef = useRef(null);

  // Local state для priorLossUAH (текстовий інпут з валідацією)
  const [priorLossInput, setPriorLossInput] = useState(
    settings.priorLossUAH > 0 ? String(settings.priorLossUAH).replace('.', ',') : ''
  );
  const [priorLossErr, setPriorLossErr] = useState('');

  const handleFiles = async (files) => {
    if (!files || !files.length) return;
    const file = files[0];
    if (!file.name.toLowerCase().endsWith('.xml')) {
      onFileLoaded(null, 'Це не XML файл. Потрібен .xml експорт з IBKR Flex Query.');
      return;
    }
    try {
      const text = await file.text();
      onFileLoaded(text, null);
    } catch (e) {
      onFileLoaded(null, 'Не вдалося прочитати файл: ' + e.message);
    }
  };

  const commitPriorLoss = () => {
    const t = priorLossInput.trim().replace(/\s/g, '').replace(',', '.');
    if (!t) {
      setSettings({ ...settings, priorLossUAH: 0 });
      setPriorLossErr('');
      return;
    }
    const v = parseFloat(t);
    if (Number.isNaN(v) || v < 0) {
      setPriorLossErr('Введіть додатне число');
      return;
    }
    setSettings({ ...settings, priorLossUAH: v });
    setPriorLossErr('');
  };

  const successText = xmlLoaded && reportDateRange
    ? `XML завантажено успішно. Дані з ${fmtDateDDMMYYYY(reportDateRange.from)} по ${fmtDateDDMMYYYY(reportDateRange.to)}`
    : null;

  const dropzoneClass = `dropzone cursor-pointer rounded-2xl p-12 text-center ${dragActive ? 'drop-active' : ''} ${xmlLoaded ? 'loaded' : ''}`;

  // Cache coverage notes
  const ccyForCache = Array.from(new Set(['USD', 'EUR', ...(reportCurrencies || []).filter((c) => c !== 'UAH')]));
  const coverageNotes = ccyForCache.map((c) => {
    const cov = cacheCoverage?.[c];
    if (!cov) return { currency: c, status: 'none', text: 'не завантажено' };
    const { min, max, count } = cov;
    const coversReport = reportDateRange
      && min <= reportDateRange.from && max >= reportDateRange.to;
    return {
      currency: c,
      status: coversReport ? 'full' : 'partial',
      text: `${count} днів · ${fmtDateDDMMYYYY(min)} — ${fmtDateDDMMYYYY(max)}${coversReport ? ' (покриває звіт)' : ''}`
    };
  });

  return h('div', { className: 'max-w-4xl mx-auto space-y-6' },
    h('div', {
      onDragEnter: (e) => {
        e.preventDefault(); e.stopPropagation();
        dragCounter.current += 1;
        if (dragCounter.current === 1) setDragActive(true);
      },
      onDragOver:  (e) => { e.preventDefault(); e.stopPropagation(); },
      onDragLeave: (e) => {
        e.preventDefault(); e.stopPropagation();
        dragCounter.current -= 1;
        if (dragCounter.current <= 0) { dragCounter.current = 0; setDragActive(false); }
      },
      onDrop:      (e) => {
        e.preventDefault(); e.stopPropagation();
        dragCounter.current = 0;
        setDragActive(false);
        handleFiles(e.dataTransfer.files);
      },
      onClick: () => inputRef.current?.click(),
      className: dropzoneClass
    },
      h('input', { ref: inputRef, type: 'file', accept: '.xml', className: 'hidden',
        onChange: (e) => handleFiles(e.target.files) }),
      h('div', { className: 'mb-4', style: { color: xmlLoaded ? 'var(--pos)' : 'var(--text-tertiary)' } },
        xmlLoaded ? h(CheckIcon) : h(UploadIcon)
      ),
      xmlLoaded
        ? h(React.Fragment, null,
            h('div', { className: 'text-lg font-medium mb-2', style: { color: 'var(--pos)' } }, successText),
            h('div', { className: 'text-sm t-text-tertiary' }, 'Перетягніть інший файл, щоб замінити')
          )
        : h(React.Fragment, null,
            h('div', { className: 'text-lg font-medium mb-2' }, 'Перетягніть IBKR Flex Query XML сюди'),
            h('div', { className: 'text-sm t-text-tertiary' },
              'або ', h('span', { style: { color: 'var(--accent)', textDecoration: 'underline' } }, 'клікніть, щоб обрати файл')
            )
          )
    ),

    parseError && h('div', {
      className: 'rounded-lg p-4 text-sm',
      style: { background: 'var(--neg-bg)', color: 'var(--neg)', border: '1px solid var(--neg)' }
    },
      h('div', { className: 'font-medium mb-1' }, 'Помилка:'), parseError
    ),

    loadingStatus && h('div', {
      className: 'rounded-lg p-4 text-sm font-mono',
      style: {
        background: loadingStatusKind === 'error' ? 'var(--neg-bg)' : 'var(--pos-bg)',
        color: loadingStatusKind === 'error' ? 'var(--neg)' : 'var(--pos)',
        border: `1px solid ${loadingStatusKind === 'error' ? 'var(--neg)' : 'var(--pos)'}`
      }
    }, loadingStatus),

    h('div', { className: 'card p-6' },
      h('h3', { className: 'text-sm font-semibold uppercase tracking-wider mb-4 t-text-secondary' }, 'Налаштування розрахунку'),
      h('div', { className: 'space-y-5' },

        // US WHT
        h('div', null,
          h('div', { className: 'text-sm font-medium mb-2 flex items-center' },
            'Зарахування 15% US withholding tax',
            h(InfoTooltip, {
              text: h(React.Fragment, null,
                h('div', { style: { fontWeight: 600, marginBottom: 4 } }, 'Що це?'),
                h('div', { style: { marginBottom: 8 } },
                  'США утримують 15% з дивідендів нерезидента (за формою W-8BEN). За Конвенцією про уникнення подвійного оподаткування ці 15% можна зарахувати як покриття українського ПДФО 9%.'),
                h('div', { style: { fontWeight: 600, marginTop: 6, marginBottom: 2 } }, 'Консервативний:'),
                h('div', null, 'Ігноруємо US WHT. Платимо повні 9%+5%=14% з gross в Україні. Найбезпечніший, документів не потрібно.'),
                h('div', { style: { fontWeight: 600, marginTop: 6, marginBottom: 2 } }, 'Агресивний:'),
                h('div', null, 'Зараховуємо US WHT — платимо тільки 5% ВЗ. Формально вимагає довідку 1042-S з легалізацією (п.13.5 ПКУ), яку на практиці важко отримати.')
              )
            })
          ),
          h('div', { className: 'grid grid-cols-2 gap-2' },
            ['conservative', 'aggressive'].map((mode) =>
              h('button', {
                key: mode, onClick: () => setSettings({ ...settings, usWhtMode: mode }),
                className: 'text-left p-3 rounded-lg transition-all text-sm',
                style: {
                  background: settings.usWhtMode === mode ? 'var(--accent-bg)' : 'var(--bg-panel-2)',
                  border: '1px solid ' + (settings.usWhtMode === mode ? 'var(--accent)' : 'var(--border-subtle)'),
                  color: settings.usWhtMode === mode ? 'var(--accent)' : 'var(--text-primary)',
                }
              },
                h('div', { className: 'font-medium' }, mode === 'conservative' ? 'Консервативний' : 'Агресивний'),
                h('div', { className: 'text-xs t-text-tertiary mt-0.5' },
                  mode === 'conservative'
                    ? 'Платити повні 9%+5% з gross, ігнорувати US WHT'
                    : 'Зараховувати US WHT як покриття ПДФО, платити тільки 5% ВЗ')
              )
            )
          )
        ),

        // Report year — DROPDOWN з років у XML
        h('div', null,
          h('div', { className: 'text-sm font-medium mb-2 flex items-center' },
            'Звітний рік (для декларації)',
            h(InfoTooltip, {
              text: 'Опціонально. Якщо в звіті операції за кілька років — обери один для фільтрації. Залиш порожнім, щоб рахувати всі дати.'
            })
          ),
          reportYears && reportYears.length > 0
            ? h('select', {
                value: settings.reportYear || '',
                onChange: (e) => {
                  const v = e.target.value;
                  setSettings({ ...settings, reportYear: v ? parseInt(v, 10) : null });
                },
                style: { minWidth: 200 }
              },
                h('option', { value: '' }, 'Усі дати'),
                reportYears.map((y) => h('option', { key: y, value: y }, y))
              )
            : h('div', { className: 't-text-tertiary text-xs' }, 'Завантажте XML, щоб побачити доступні роки')
        ),

        // Prior-year losses — ТЕКСТОВИЙ input без стрілок
        h('div', null,
          h('div', { className: 'text-sm font-medium mb-2 flex items-center' },
            'Врахувати збитки минулих періодів (₴)',
            h(InfoTooltip, {
              text: 'Сума раніше задекларованого інвестиційного збитку (у гривнях), який можна застосувати до поточного прибутку (п.170.2.6 ПКУ). Вводиться вже у UAH — має бути перерахований на дату декларування. Застосовується ТІЛЬКИ до інвестприбутку, не до дивідендів.'
            })
          ),
          h('input', {
            type: 'text', inputMode: 'decimal',
            value: priorLossInput,
            onChange: (e) => setPriorLossInput(e.target.value),
            onBlur: commitPriorLoss,
            onKeyDown: (e) => e.key === 'Enter' && commitPriorLoss(),
            placeholder: '0',
            style: { width: 280 }
          }),
          priorLossErr && h('div', { className: 'text-xs mt-1', style: { color: 'var(--neg)' } }, priorLossErr)
        ),

        // ВЗ info
        h('div', {
          className: 'p-3 rounded-lg text-xs',
          style: { background: 'var(--bg-panel-2)', border: '1px solid var(--border-subtle)' }
        },
          h('div', { className: 'font-medium t-text-primary mb-1' }, 'ℹ Ставка військового збору'),
          h('div', { className: 't-text-secondary' },
            'Для доходів по ',
            h('span', { style: { fontWeight: 600 } }, '31.12.2024'),
            ' включно застосовується ставка ',
            h('span', { style: { fontWeight: 600, color: 'var(--accent)' } }, '1,5%'),
            '. Для доходів, отриманих з ',
            h('span', { style: { fontWeight: 600 } }, '01.01.2025'),
            ' — ',
            h('span', { style: { fontWeight: 600, color: 'var(--accent)' } }, '5%'),
            '. Ставка визначається автоматично за датою виплати дивіденду або за звітним роком для капгейну.'
          )
        ),

        // Cache status
        h('div', { className: 'pt-4', style: { borderTop: '1px solid var(--border-subtle)' } },
          h('div', { className: 'text-xs font-medium t-text-secondary mb-2' }, 'Кеш курсів НБУ'),
          h('div', { className: 'space-y-1 text-xs mb-3' },
            coverageNotes.length === 0
              ? h('div', { className: 't-text-muted' }, 'Кеш порожній')
              : coverageNotes.map((n) =>
                  h('div', { key: n.currency, className: 'flex items-center gap-2' },
                    h('span', {
                      className: 'w-12 font-mono font-medium',
                      style: {
                        color: n.status === 'full' ? 'var(--pos)'
                          : n.status === 'partial' ? 'var(--warn)'
                          : 'var(--text-muted)'
                      }
                    }, n.currency),
                    h('span', { className: 't-text-tertiary' }, n.text)
                  )
                )
          ),
          h('button', {
            onClick: onClearCache,
            className: 'text-xs t-text-tertiary underline',
            onMouseEnter: (e) => { e.currentTarget.style.color = 'var(--text-primary)'; },
            onMouseLeave: (e) => { e.currentTarget.style.color = 'var(--text-tertiary)'; },
          }, 'Очистити кеш курсів НБУ')
        )
      )
    ),

    h('div', { className: 'card p-5 text-sm t-text-secondary space-y-2' },
      h('div', { className: 'font-medium t-text-primary mb-2' }, 'Як це працює'),
      h('div', null, '1. Закидаєш XML-експорт IBKR Flex Query'),
      h('div', null, '2. Додаток підтягує курси НБУ одним запитом за увесь період (bulk API)'),
      h('div', null, '3. Розраховує ПДФО 9%/18% і ВЗ з правильною ставкою (1.5% для доходів по 2024 рік, 5% з 2025 року)'),
      h('div', null, '4. Курси кешуються локально — повторні запуски миттєві, без запитів'),
      h('div', { className: 'pt-2 text-xs t-text-tertiary' },
        'Усі дані залишаються в твоєму браузері. Запити ідуть лише до bank.gov.ua за курсами.')
    )
  );
}

function DashboardTab({ agg, settings, rateMap, rateLoadRange }) {
  if (!agg) return h('div', { className: 't-text-tertiary' }, 'Немає даних. Завантажте XML на вкладці Upload.');
  const t = agg.totals;

  // Валюти що є у звіті (для графіка курсів і KPI-розбивки)
  const reportCurrencies = useMemo(() => {
    const set = new Set();
    agg.divs.forEach(d => d.currency && set.add(d.currency));
    agg.trades.forEach(x => x.currency && set.add(x.currency));
    set.delete('UAH');
    return Array.from(set).sort();
  }, [agg]);

  // Стан: які валюти показані на графіку курсів
  const [visibleCcy, setVisibleCcy] = useState(() => {
    const init = {};
    ['USD', 'EUR', ...reportCurrencies].forEach(c => { init[c] = true; });
    return init;
  });
  const toggleCcy = (c) => setVisibleCcy(v => ({ ...v, [c]: !v[c] }));

  const allCcy = Array.from(new Set(['USD', 'EUR', ...reportCurrencies]));
  const activeCcy = allCcy.filter(c => visibleCcy[c]);

  const rateChartData = useMemo(() => {
    if (!rateMap || !rateLoadRange) return [];
    return buildRateChartData(rateMap, allCcy, rateLoadRange.from, rateLoadRange.to);
  }, [rateMap, rateLoadRange, reportCurrencies.join(',')]);

  // Subtitle рядок
  const subtitleParts = [
    `Звітний рік: ${agg.reportYear || 'всі дати'}`,
    `Режим: ${settings.usWhtMode === 'conservative' ? 'консервативний' : 'агресивний'}`,
  ];
  if (settings.priorLossUAH > 0) {
    subtitleParts.push(`Враховано збитку минулих періодів: ${fmtUAH(settings.priorLossUAH, 0)}`);
  }

  // CustomTooltip для Monthly dividends chart (UAH + USD)
  const MonthlyTooltip = ({ active, payload }) => {
    if (!active || !payload || !payload.length) return null;
    const d = payload[0].payload;
    return h('div', {
      style: {
        background: 'var(--tooltip-bg)', border: '1px solid var(--tooltip-border)',
        color: 'var(--tooltip-text)', padding: '10px 14px', borderRadius: 8,
        fontSize: 12, fontFamily: 'Inter, sans-serif',
        boxShadow: '0 8px 30px rgba(0,0,0,0.3)', minWidth: 180,
      }
    },
      h('div', { style: { fontWeight: 600, marginBottom: 8 } }, d.month),
      h('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: 14, fontWeight: 600, color: 'var(--pos-soft)' } }, fmtUAH(d.grossUAH)),
      h('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--text-secondary)', marginTop: 2 } }, fmtUSD(d.grossUSD)),
      h('div', { style: { fontSize: 11, color: 'var(--text-tertiary)', marginTop: 6, paddingTop: 6, borderTop: '1px solid var(--border-subtle)' } },
        'Податок: ', h('span', { style: { fontFamily: 'JetBrains Mono, monospace' } }, fmtUAH(d.taxUAH, 0)))
    );
  };

  // CustomTooltip для pie дивідендів (UAH + валюта)
  const DivPieTooltip = ({ active, payload }) => {
    if (!active || !payload || !payload.length) return null;
    const d = payload[0].payload;
    return h('div', {
      style: {
        background: 'var(--tooltip-bg)', border: '1px solid var(--tooltip-border)',
        color: 'var(--tooltip-text)', padding: '10px 14px', borderRadius: 8,
        fontSize: 12, boxShadow: '0 8px 30px rgba(0,0,0,0.3)', minWidth: 180,
      }
    },
      h('div', { style: { fontWeight: 600, marginBottom: 8 } }, d.symbol,
        h('span', { style: { color: 'var(--text-tertiary)', fontWeight: 400, marginLeft: 6 } }, `${d.count} виплат`)),
      h('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: 14, fontWeight: 600 } }, fmtUAH(d.grossUAH)),
      h('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--text-secondary)', marginTop: 2 } },
        fmtCur(d.grossCurrency, d.currency || 'USD'))
    );
  };

  // CustomTooltip для P&L по тикерах (UAH + валюта + %)
  const PnlTooltip = ({ active, payload }) => {
    if (!active || !payload || !payload.length) return null;
    const d = payload[0].payload;
    const positive = d.pnlUAH >= 0;
    const pctUAH = d.costUAH ? (d.pnlUAH / d.costUAH * 100) : 0;
    const pctCur = d.costCurrency ? (d.pnlCurrency / d.costCurrency * 100) : 0;
    return h('div', {
      style: {
        background: 'var(--tooltip-bg)', border: '1px solid var(--tooltip-border)',
        color: 'var(--tooltip-text)', padding: '10px 14px', borderRadius: 8,
        fontSize: 12, boxShadow: '0 8px 30px rgba(0,0,0,0.3)', minWidth: 220,
      }
    },
      h('div', { style: { fontWeight: 600, marginBottom: 8 } }, d.symbol,
        h('span', { style: { color: 'var(--text-tertiary)', fontWeight: 400, marginLeft: 6 } }, `${d.count} лотів`)),
      h('div', {
        style: {
          fontFamily: 'JetBrains Mono, monospace', fontSize: 14, fontWeight: 600,
          color: positive ? 'var(--pos-soft)' : 'var(--neg-soft)',
          display: 'flex', justifyContent: 'space-between', gap: 12
        }
      },
        h('span', null, (positive ? '+' : '') + fmtUAH(d.pnlUAH)),
        h('span', { style: { fontSize: 12 } }, `${pctUAH >= 0 ? '+' : ''}${pctUAH.toFixed(2)}%`)
      ),
      h('div', {
        style: {
          fontFamily: 'JetBrains Mono, monospace', fontSize: 11,
          color: 'var(--text-secondary)', marginTop: 4,
          display: 'flex', justifyContent: 'space-between', gap: 12
        }
      },
        h('span', null, (d.pnlCurrency >= 0 ? '+' : '') + fmtCur(d.pnlCurrency, d.currency || 'USD')),
        h('span', null, `${pctCur >= 0 ? '+' : ''}${pctCur.toFixed(2)}%`)
      )
    );
  };

  // CustomTooltip для графіка курсів (дата + всі активні валюти)
  const RateChartTooltip = ({ active, payload, label }) => {
    if (!active || !payload || !payload.length) return null;
    return h('div', {
      style: {
        background: 'var(--tooltip-bg)', border: '1px solid var(--tooltip-border)',
        color: 'var(--tooltip-text)', padding: '10px 14px', borderRadius: 8,
        fontSize: 12, boxShadow: '0 8px 30px rgba(0,0,0,0.3)', minWidth: 160,
      }
    },
      h('div', { style: { fontWeight: 600, marginBottom: 6 } }, fmtDateDDMMYYYY(label)),
      payload.map((p, i) =>
        h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', gap: 12, fontFamily: 'JetBrains Mono, monospace' } },
          h('span', { style: { color: p.color } }, p.name, ':'),
          h('span', null, fmtNum(p.value, 4), ' ₴')
        )
      )
    );
  };

  // NET result для info-рядка
  const netUAH = t.dividendsNetUAH + (t.tradesPnlUAH > 0 ? t.tradesPnlUAH - t.tradesTaxUAH : t.tradesPnlUAH);
  const netLabel = netUAH >= 0 ? 'Чистий дохід на руки' : 'Чистий збиток на руки';

  // currency breakdown renderer
  const renderCcyBreakdown = (breakdown, signed = false) => {
    if (!breakdown || breakdown.length <= 1) return null;
    return h('div', {
      className: 'mt-2 pt-2 space-y-0.5',
      style: { borderTop: '1px solid var(--border-subtle)' }
    },
      breakdown.map((cb, i) => {
        const v = signed ? cb.pnlCurrency : cb.grossCurrency;
        return h('div', { key: i, className: 'flex justify-between text-xs t-text-tertiary' },
          h('span', null, cb.currency, ':'),
          h('span', {
            className: 'font-mono',
            style: { color: v > 0 ? 'var(--pos)' : v < 0 ? 'var(--neg)' : 'var(--text-tertiary)' }
          }, (signed && v > 0 ? '+' : '') + fmtCur(v, cb.currency))
        );
      })
    );
  };

  return h('div', null,
    h('div', { className: 'mb-6' },
      h('h1', { className: 'text-2xl font-bold tracking-tight' }, 'Податковий дашборд'),
      h('div', { className: 'text-sm t-text-tertiary mt-1' }, subtitleParts.join(' · '))
    ),

    // ROW 1: Дивіденди Gross | ПДФО 9% | ВЗ 5% (по 1/3)
    h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4 mb-4' },
      h('div', { className: 'card card-hover p-5' },
        h('div', { className: 'text-[11px] uppercase tracking-wider t-text-tertiary mb-2' }, 'Дивіденди Gross (UAH)'),
        h('div', { className: 'text-2xl font-mono font-medium num-animate', style: { color: 'var(--pos-soft)' } }, fmtUAH(t.grossDividendsUAH)),
        h('div', { className: 't-text-tertiary text-xs mt-1.5' }, `${agg.divs.length} виплат`),
        renderCcyBreakdown(agg.divByCurrency, false)
      ),
      h(KPI, {
        label: 'ПДФО з дивідендів (9%)',
        value: fmtUAH(t.dividendsPdfoUAH),
        sub: settings.usWhtMode === 'aggressive' ? 'Після US WHT credit' : 'Без US credit',
        tone: 'accent'
      }),
      h(KPI, {
        label: `ВЗ з дивідендів (${t.dividendsVzMixed ? '1,5% + 5%' : fmtVzRate(t.dividendsVzRate)})`,
        value: fmtUAH(t.dividendsVzUAH),
        sub: t.dividendsVzMixed
          ? `${fmtUAH(t.dividendsVzOldUAH, 0)} (1,5%) + ${fmtUAH(t.dividendsVzNewUAH, 0)} (5%)`
          : 'Сплачується повністю',
        tone: 'accent'
      })
    ),

    // ROW 2: Інвестприбуток | ПДФО 18% | ВЗ 5% (по 1/3)
    h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4 mb-4' },
      h('div', { className: 'card card-hover p-5' },
        h('div', { className: 'text-[11px] uppercase tracking-wider t-text-tertiary mb-2' }, 'Інвестприбуток (UAH)'),
        h('div', {
          className: 'text-2xl font-mono font-medium num-animate',
          style: { color: t.tradesPnlUAH >= 0 ? 'var(--pos-soft)' : 'var(--neg-soft)' }
        }, fmtUAH(t.tradesPnlUAH)),
        h('div', { className: 't-text-tertiary text-xs mt-1.5' }, `${agg.trades.length} лотів`),
        renderCcyBreakdown(agg.tradesByCurrency, true)
      ),
      h(KPI, {
        label: 'ПДФО з прибутку (18%)',
        value: fmtUAH(t.tradesPdfoUAH),
        sub: t.priorLossUsedUAH > 0
          ? `Використано збитків: ${fmtUAH(t.priorLossUsedUAH, 0)}`
          : (t.tradesPnlUAH < 0 ? 'Збиток — податок 0' : 'З NET прибутку'),
        tone: 'accent'
      }),
      h(KPI, {
        label: `ВЗ з прибутку (${fmtVzRate(t.tradesVzRate)})`,
        value: fmtUAH(t.tradesVzUAH),
        sub: t.tradesPnlUAH < 0 ? 'Збиток — податок 0' : 'З NET прибутку',
        tone: 'accent'
      })
    ),

    // ROW 3: Net (інформативна, 50%) | Tax (50%)
    h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4 mb-6' },
      h(KPI, {
        label: netLabel,
        value: fmtUAH(netUAH),
        sub: 'Дивіденди після податків + P&L',
        tone: netUAH >= 0 ? 'positive' : 'negative'
      }),
      h(KPI, {
        label: 'Податок до сплати',
        value: fmtUAH(t.totalTaxUAH),
        sub: `ПДФО ${fmtUAH(t.dividendsPdfoUAH + t.tradesPdfoUAH, 0)} + ВЗ ${fmtUAH(t.dividendsVzUAH + t.tradesVzUAH, 0)}`,
        tone: 'warn'
      })
    ),

    // Loss carryforward notice
    (settings.priorLossUAH > 0 || t.lossCarryForwardUAH > 0) &&
      h('div', {
        className: 'card p-4 mb-6 text-sm',
        style: { background: 'var(--accent-bg)', borderColor: 'var(--accent)' }
      },
        settings.priorLossUAH > 0 && h('div', null,
          h('span', { className: 'font-medium', style: { color: 'var(--accent)' } }, 'Збитки минулих періодів: '),
          h('span', { className: 'font-mono' }, fmtUAH(settings.priorLossUAH)),
          ' · використано: ',
          h('span', { className: 'font-mono', style: { color: 'var(--pos)' } }, fmtUAH(t.priorLossUsedUAH)),
          ' · залишок: ',
          h('span', { className: 'font-mono' }, fmtUAH(t.priorLossRemainingUAH))
        ),
        t.lossCarryForwardUAH > 0 && h('div', { className: 'mt-1' },
          h('span', { className: 'font-medium', style: { color: 'var(--accent)' } }, 'Збиток поточного року: '),
          h('span', { className: 'font-mono' }, fmtUAH(t.lossCarryForwardUAH)),
          ' — переноситься на наступний рік'
        )
      ),

    // Charts row 1: Monthly dividends + Dividends pie
    h('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4' },
      h('div', { className: 'lg:col-span-2 card p-5' },
        h('div', { className: 'text-[11px] uppercase tracking-wider t-text-tertiary mb-4' }, 'Дивіденди по місяцях (UAH)'),
        agg.monthly.length === 0
          ? h('div', { className: 't-text-tertiary text-sm py-8 text-center' }, 'Немає даних')
          : h(ResponsiveContainer, { width: '100%', height: 260 },
              h(BarChart, { data: agg.monthly, margin: { top: 5, right: 10, left: 0, bottom: 5 } },
                h(CartesianGrid, { strokeDasharray: '3 3', stroke: 'var(--border-subtle)', vertical: false }),
                h(XAxis, { dataKey: 'month', stroke: 'var(--text-tertiary)', fontSize: 11 }),
                h(YAxis, { stroke: 'var(--text-tertiary)', fontSize: 11,
                  tickFormatter: (v) => v >= 1000 ? `${(v/1000).toFixed(0)}k` : v }),
                h(Tooltip, { content: h(MonthlyTooltip), cursor: { fill: 'var(--accent-bg)' } }),
                h(Bar, { dataKey: 'grossUAH', fill: 'var(--accent)', name: 'Gross', radius: [4, 4, 0, 0] })
              )
            )
      ),
      h('div', { className: 'card p-5' },
        h('div', { className: 'text-[11px] uppercase tracking-wider t-text-tertiary mb-4' }, 'Структура дивідендів'),
        agg.divBySymbol.length === 0
          ? h('div', { className: 't-text-tertiary text-sm py-8 text-center' }, 'Немає даних')
          : h(ResponsiveContainer, { width: '100%', height: 260 },
              h(PieChart, null,
                h(Pie, {
                  data: agg.divBySymbol, dataKey: 'grossUAH', nameKey: 'symbol',
                  innerRadius: 50, outerRadius: 95, paddingAngle: 2,
                  label: ({ symbol, percent }) => percent > 0.05 ? symbol : '',
                  labelLine: false, fontSize: 10,
                  stroke: 'var(--bg-panel)', strokeWidth: 2
                },
                  agg.divBySymbol.map((_, i) => h(Cell, { key: i, fill: CHART_COLORS[i % CHART_COLORS.length] }))
                ),
                h(Tooltip, { content: h(DivPieTooltip) })
              )
            )
      )
    ),

    // Charts row 2: Accounts + P&L by symbol
    h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4' },
      h('div', { className: 'card p-5' },
        h('div', { className: 'text-[11px] uppercase tracking-wider t-text-tertiary mb-4' }, 'По акаунтах'),
        h('div', { className: 'space-y-3' },
          agg.byAccount.map((a) =>
            h('div', { key: a.account, className: 'flex items-center justify-between py-2',
              style: { borderBottom: '1px solid var(--border-subtle)' } },
              h('div', null,
                h('div', { className: 'text-sm font-medium' }, a.account),
                h('div', { className: 't-text-tertiary text-xs mt-0.5' },
                  `Дивіденди: ${fmtUAH(a.divGross, 0)}`,
                  a.tradePnl !== 0 ? h('span', null, ' · P&L: ',
                    h('span', { style: { color: a.tradePnl >= 0 ? 'var(--pos)' : 'var(--neg)' } }, fmtUAH(a.tradePnl, 0))
                  ) : null
                )
              ),
              h('div', { className: 'text-right' },
                h('div', { className: 'text-sm font-mono', style: { color: 'var(--warn)' } }, fmtUAH(a.divTax, 0)),
                h('div', { className: 't-text-tertiary text-xs' }, 'податок з div')
              )
            )
          )
        )
      ),
      h('div', { className: 'card p-5' },
        h('div', { className: 'text-[11px] uppercase tracking-wider t-text-tertiary mb-4' }, 'P&L по тикерах'),
        agg.tradesBySymbol.length === 0
          ? h('div', { className: 't-text-tertiary text-sm py-8 text-center' }, 'Немає угод у цьому періоді')
          : h(ResponsiveContainer, { width: '100%', height: 240 },
              h(BarChart, { data: agg.tradesBySymbol, layout: 'vertical', margin: { top: 5, right: 10, left: 40, bottom: 5 } },
                h(CartesianGrid, { strokeDasharray: '3 3', stroke: 'var(--border-subtle)', horizontal: false }),
                h(XAxis, { type: 'number', stroke: 'var(--text-tertiary)', fontSize: 11 }),
                h(YAxis, { type: 'category', dataKey: 'symbol', stroke: 'var(--text-tertiary)', fontSize: 11 }),
                h(ReferenceLine, { x: 0, stroke: 'var(--border-strong)' }),
                h(Tooltip, { content: h(PnlTooltip), cursor: { fill: 'var(--accent-bg)' } }),
                h(Bar, { dataKey: 'pnlUAH', name: 'P&L UAH', radius: [0, 4, 4, 0] },
                  agg.tradesBySymbol.map((d, i) =>
                    h(Cell, { key: i, fill: d.pnlUAH >= 0 ? 'var(--pos)' : 'var(--neg)' })
                  )
                )
              )
            )
      )
    ),

    // Charts row 3: Курс валют (повна ширина)
    h('div', { className: 'card p-5 mb-6' },
      h('div', { className: 'flex items-center justify-between mb-4 flex-wrap gap-3' },
        h('div', { className: 'text-[11px] uppercase tracking-wider t-text-tertiary' }, 'Курс валют'),
        // Toggle для валют
        h('div', { className: 'flex items-center gap-2 flex-wrap' },
          allCcy.map((c, i) =>
            h('button', {
              key: c,
              onClick: () => toggleCcy(c),
              className: 'px-2.5 py-1 text-xs rounded-md font-mono transition-all',
              style: {
                background: visibleCcy[c] ? 'var(--accent-bg)' : 'var(--bg-panel-2)',
                color: visibleCcy[c] ? CHART_COLORS[i % CHART_COLORS.length] : 'var(--text-muted)',
                border: '1px solid ' + (visibleCcy[c] ? CHART_COLORS[i % CHART_COLORS.length] : 'var(--border-subtle)'),
                opacity: visibleCcy[c] ? 1 : 0.55,
              },
              title: visibleCcy[c] ? `Приховати ${c}` : `Показати ${c}`
            },
              // Legend swatch
              h('span', { style: {
                display: 'inline-block', width: 8, height: 8, borderRadius: '50%',
                background: CHART_COLORS[i % CHART_COLORS.length],
                marginRight: 6, verticalAlign: 'middle',
                opacity: visibleCcy[c] ? 1 : 0.4
              }}),
              c
            )
          )
        )
      ),
      rateChartData.length === 0 || activeCcy.length === 0
        ? h('div', { className: 't-text-tertiary text-sm py-8 text-center' },
            activeCcy.length === 0 ? 'Оберіть хоча б одну валюту для відображення' : 'Немає даних про курси')
        : h(ResponsiveContainer, { width: '100%', height: 280 },
            h(LineChart, { data: rateChartData, margin: { top: 5, right: 10, left: 0, bottom: 5 } },
              h(CartesianGrid, { strokeDasharray: '3 3', stroke: 'var(--border-subtle)', vertical: false }),
              h(XAxis, {
                dataKey: 'date',
                stroke: 'var(--text-tertiary)',
                fontSize: 11,
                tickFormatter: (v) => {
                  const [y, m, d] = v.split('-');
                  return `${d}.${m}`;
                },
                minTickGap: 30
              }),
              h(YAxis, {
                stroke: 'var(--text-tertiary)',
                fontSize: 11,
                domain: ['auto', 'auto'],
                tickFormatter: (v) => fmtNum(v, 2)
              }),
              h(Tooltip, { content: h(RateChartTooltip) }),
              activeCcy.map((c) => {
                const idx = allCcy.indexOf(c);
                return h(Line, {
                  key: c,
                  type: 'monotone',
                  dataKey: c,
                  stroke: CHART_COLORS[idx % CHART_COLORS.length],
                  strokeWidth: 2,
                  dot: false,
                  activeDot: { r: 4 },
                  name: c,
                  connectNulls: true
                });
              })
            )
          )
    )
  );
}
