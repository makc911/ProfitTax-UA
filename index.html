// SECTION: TAB_DIVIDENDS
// ═══════════════════════════════════════════════════════════

function DividendsTab({ agg }) {
  const [filterAccount, setFilterAccount] = useState('all');
  const [filterSymbol, setFilterSymbol] = useState('all');
  const [filterROC, setFilterROC] = useState('all');
  // Set з ключами згорнутих груп. За замовчуванням — всі згорнуті.
  // useRef відстежує чи бачили цей набір ключів хоча б раз, щоб не скидати стан при кожному re-render.
  const [collapsed, setCollapsed] = useState(() => new Set());
  const [legendOpen, setLegendOpen] = useState(false);
  const seenKeysRef = useRef(new Set());

  if (!agg) return h('div', { className: 't-text-tertiary' }, 'Немає даних.');

  const accounts = Array.from(new Set(agg.divs.map(d => d.accountId)));
  const symbols = Array.from(new Set(agg.divs.map(d => d.symbol))).sort();

  const filtered = agg.divs.filter(d => {
    if (filterAccount !== 'all' && d.accountId !== filterAccount) return false;
    if (filterSymbol !== 'all' && d.symbol !== filterSymbol) return false;
    if (filterROC === 'rocOnly' && !d.hasROC) return false;
    if (filterROC === 'noROC' && d.hasROC) return false;
    return true;
  });

  const grouped = {};
  filtered.forEach(d => {
    const key = `${d.accountId}||${d.symbol}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  });
  const keys = Object.keys(grouped).sort();

  // Нові групи (яких ще не бачили) — автоматично додаємо до collapsed
  useEffect(() => {
    const newlyCollapsed = [];
    keys.forEach(k => {
      if (!seenKeysRef.current.has(k)) {
        seenKeysRef.current.add(k);
        newlyCollapsed.push(k);
      }
    });
    if (newlyCollapsed.length > 0) {
      setCollapsed(prev => {
        const next = new Set(prev);
        newlyCollapsed.forEach(k => next.add(k));
        return next;
      });
    }
  }, [keys.join('|')]);

  const toggleGroup = (key) => {
    setCollapsed(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key);
      else next.add(key);
      return next;
    });
  };

  const totals = filtered.reduce((acc, d) => ({
    gross: acc.gross + d.grossUAH, base: acc.base + d.baseUAH,
    usWht: acc.usWht + d.usWhtUAH, pdfo: acc.pdfo + d.pdfoToPayUAH,
    vz: acc.vz + d.vzToPayUAH, tax: acc.tax + d.totalTaxUAH, net: acc.net + d.netReceivedUAH,
  }), { gross: 0, base: 0, usWht: 0, pdfo: 0, vz: 0, tax: 0, net: 0 });

  const FilterBtn = ({ value, current, onClick, children }) =>
    h('button', {
      onClick: () => onClick(value),
      className: 'px-2.5 py-1 text-xs rounded-md transition-all',
      style: {
        background: current === value ? 'var(--accent-bg)' : 'transparent',
        color: current === value ? 'var(--accent)' : 'var(--text-tertiary)',
      }
    }, children);

  return h('div', null,
    h('div', { className: 'mb-5 flex items-center gap-6 flex-wrap' },
      h('div', null,
        h('span', { className: 'text-xs t-text-tertiary mr-2' }, 'Акаунт:'),
        h('select', { value: filterAccount, onChange: (e) => setFilterAccount(e.target.value) },
          h('option', { value: 'all' }, 'Всі'),
          accounts.map(a => h('option', { key: a, value: a }, a))
        )
      ),
      h('div', null,
        h('span', { className: 'text-xs t-text-tertiary mr-2' }, 'Тикер:'),
        h('select', { value: filterSymbol, onChange: (e) => setFilterSymbol(e.target.value), style: { fontFamily: 'JetBrains Mono, monospace' } },
          h('option', { value: 'all' }, 'Всі'),
          symbols.map(s => h('option', { key: s, value: s }, s))
        )
      ),
      h('div', { className: 'flex items-center gap-1' },
        h('span', { className: 'text-xs t-text-tertiary mr-1' }, 'ROC:'),
        h(FilterBtn, { value: 'all', current: filterROC, onClick: setFilterROC }, 'Всі'),
        h(FilterBtn, { value: 'rocOnly', current: filterROC, onClick: setFilterROC }, 'Тільки з ROC'),
        h(FilterBtn, { value: 'noROC', current: filterROC, onClick: setFilterROC }, 'Без ROC'),
      ),
      h('button', {
        onClick: () => {
          const allCollapsed = keys.every(k => collapsed.has(k));
          setCollapsed(allCollapsed ? new Set() : new Set(keys));
        },
        className: 'px-2.5 py-1 text-xs rounded-md transition-all',
        style: {
          background: 'var(--bg-panel-2)',
          color: 'var(--text-secondary)',
          border: '1px solid var(--border-subtle)',
        },
        onMouseEnter: (e) => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; },
        onMouseLeave: (e) => { e.currentTarget.style.color = 'var(--text-secondary)'; e.currentTarget.style.borderColor = 'var(--border-subtle)'; },
      },
        keys.length > 0 && keys.every(k => collapsed.has(k)) ? '▼ Розгорнути все' : '▶ Згорнути все'
      ),
      h('div', { className: 'ml-auto text-xs t-text-tertiary' },
        `${filtered.length} з ${agg.divs.length} дивідендів`)
    ),

    h('div', {
      className: 'card',
      style: {
        maxHeight: '70vh',
        overflow: 'auto',
        position: 'relative',
      }
    },
      h('table', { className: 'w-full text-xs', style: { borderCollapse: 'separate', borderSpacing: 0 } },
        h('thead', null,
          h('tr', null,
            ['Акаунт', 'Тикер', 'Дата', 'Gross cur', 'WHT cur', 'ROC', 'Net cur',
             'Курс', 'Gross ₴', 'ПДФО ₴', 'ВЗ ₴', 'Всього податку', 'Чистий дохід'].map((c, i) =>
              h('th', { key: i,
                className: `px-3 py-2.5 text-xs font-medium uppercase tracking-wider t-text-tertiary ${i >= 3 ? 'text-right' : 'text-left'}`,
                style: {
                  position: 'sticky',
                  top: 0,
                  zIndex: 10,
                  background: 'var(--bg-table-header)',
                  borderBottom: '1px solid var(--border)',
                  whiteSpace: 'nowrap',
                }
              }, c)
            )
          )
        ),
        h('tbody', null,
          keys.flatMap(key => {
            const rows = grouped[key];
            const [accId, sym] = key.split('||');
            const subtot = rows.reduce((acc, d) => ({
              gross: acc.gross + d.grossUAH, base: acc.base + d.baseUAH,
              usWht: acc.usWht + d.usWhtUAH, pdfo: acc.pdfo + d.pdfoToPayUAH,
              vz: acc.vz + d.vzToPayUAH, tax: acc.tax + d.totalTaxUAH, net: acc.net + d.netReceivedUAH,
            }), { gross: 0, base: 0, usWht: 0, pdfo: 0, vz: 0, tax: 0, net: 0 });
            const isCollapsed = collapsed.has(key);
            return [
              h('tr', { key: `h_${key}`, style: { borderBottom: '1px solid var(--border-subtle)' } },
                h('td', {
                  colSpan: 13,
                  className: 'px-3 py-1.5 text-xs font-medium cursor-pointer select-none',
                  style: { color: 'var(--accent)', background: 'var(--bg-group-header)' },
                  onClick: () => toggleGroup(key)
                },
                  h('span', { style: { display: 'inline-block', width: 14, textAlign: 'center', fontSize: 9 } },
                    isCollapsed ? '▶' : '▼'),
                  `  ${accId}  •  ${sym}  `,
                  h('span', { className: 't-text-tertiary' }, `(${rows.length} виплат)`)
                )
              ),
              ...(isCollapsed ? [] : rows.map((d, i) => {
                const cur = d.currency || 'USD';
                const whtCur = d.whtGrossUSD || 0;            // повне утримання США
                const rocCur = d.rocReceivedUSD || 0;         // повернення капіталу
                const netCur = (d.grossUSD || 0) - whtCur + rocCur;  // фактично отримано cash
                return h('tr', { key: `r_${key}_${i}_${d.transactionID || ''}`, className: 'data-row',
                  style: { borderBottom: '1px solid var(--border-subtle)' } },
                  h('td', { className: 'px-3 py-2 t-text-tertiary' }, d.accountId),
                  h('td', { className: 'px-3 py-2 font-mono font-medium text-sm' }, d.symbol,
                    d.hasROC && h('span', {
                      className: 'ml-1.5 text-[9px] px-1 py-0.5 rounded',
                      style: { background: 'var(--warn-bg)', color: 'var(--warn)' },
                      title: `ROC реверсовано: ${fmtCur(d.rocReversedUSD, cur)}`
                    }, 'ROC')
                  ),
                  h('td', { className: 'px-3 py-2 t-text-tertiary font-mono' }, fmtDateDDMMYY(d.date)),
                  // Gross cur
                  h('td', { className: 'px-3 py-2 text-right font-mono' }, fmtCur(d.grossUSD, cur)),
                  // WHT cur
                  h('td', { className: 'px-3 py-2 text-right font-mono', style: { color: 'var(--neg)' } },
                    whtCur > 0 ? '−' + fmtCur(whtCur, cur) : '—'),
                  // ROC
                  h('td', { className: 'px-3 py-2 text-right font-mono', style: { color: 'var(--warn)' } },
                    rocCur > 0 ? '+' + fmtCur(rocCur, cur) : '—'),
                  // Net cur
                  h('td', { className: 'px-3 py-2 text-right font-mono', style: { color: 'var(--pos)' } },
                    fmtCur(netCur, cur)),
                  // Курс
                  h('td', { className: 'px-3 py-2 text-right font-mono t-text-tertiary' },
                    d.rate ? fmtNum(d.rate, 4) : '—'),
                  // Gross ₴
                  h('td', { className: 'px-3 py-2 text-right font-mono t-text-tertiary' }, fmtUAH(d.grossUAH)),
                  // ПДФО ₴
                  h('td', { className: 'px-3 py-2 text-right font-mono' }, fmtUAH(d.pdfoToPayUAH)),
                  // ВЗ ₴
                  h('td', { className: 'px-3 py-2 text-right font-mono' }, fmtUAH(d.vzToPayUAH)),
                  // Всього податку
                  h('td', { className: 'px-3 py-2 text-right font-mono', style: { color: 'var(--warn)' } },
                    fmtUAH(d.totalTaxUAH)),
                  // Чистий дохід
                  h('td', { className: 'px-3 py-2 text-right font-mono', style: { color: 'var(--pos)' } },
                    fmtUAH(d.netReceivedUAH)),
                );
              })),
              h('tr', { key: `s_${key}`, className: 'font-medium',
                style: { borderBottom: '1px solid var(--border)', background: 'var(--bg-group-header)' } },
                // Акаунт, Тикер, Дата → лейбл
                h('td', { colSpan: 3, className: 'px-3 py-2 text-right text-xs t-text-secondary' }, `Разом по ${sym}:`),
                // Gross cur
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm' },
                  fmtCur(rows.reduce((s, r) => s + r.grossUSD, 0), rows[0]?.currency || 'USD')),
                // WHT cur (повна сума утримання)
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm', style: { color: 'var(--neg)' } },
                  (() => {
                    const sw = rows.reduce((s, r) => s + (r.whtGrossUSD || 0), 0);
                    return sw > 0 ? '−' + fmtCur(sw, rows[0]?.currency || 'USD') : '—';
                  })()),
                // ROC (повернення капіталу)
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm', style: { color: 'var(--warn)' } },
                  (() => {
                    const r = rows.reduce((s, x) => s + (x.rocReceivedUSD || 0), 0);
                    return r > 0 ? '+' + fmtCur(r, rows[0]?.currency || 'USD') : '—';
                  })()),
                // Net cur = Gross − повне WHT + ROC
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm', style: { color: 'var(--pos)' } },
                  fmtCur(rows.reduce((s, r) => s + r.grossUSD - (r.whtGrossUSD || 0) + (r.rocReceivedUSD || 0), 0), rows[0]?.currency || 'USD')),
                // Курс — порожній
                h('td'),
                // Gross ₴
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm t-text-secondary' }, fmtUAH(subtot.gross)),
                // ПДФО ₴
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm' }, fmtUAH(subtot.pdfo)),
                // ВЗ ₴
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm' }, fmtUAH(subtot.vz)),
                // Всього податку
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm', style: { color: 'var(--warn)' } }, fmtUAH(subtot.tax)),
                // Чистий дохід
                h('td', { className: 'px-3 py-2 text-right font-mono text-sm', style: { color: 'var(--pos)' } }, fmtUAH(subtot.net)),
              )
            ];
          })
        ),
        h('tfoot', null,
          h('tr', null,
            // ВСЬОГО: лейбл охоплює Акаунт, Тикер, Дата, Gross cur, WHT cur, ROC, Net cur
            h('td', {
              colSpan: 7,
              className: 'px-3 py-3 text-sm font-semibold text-right uppercase tracking-wider',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }, 'ВСЬОГО (₴):'),
            // Курс — порожнє
            h('td', { style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' } }),
            // Gross ₴
            h('td', { className: 'px-3 py-3 text-right font-mono font-bold t-text-secondary',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }, fmtUAH(totals.gross)),
            // ПДФО ₴
            h('td', { className: 'px-3 py-3 text-right font-mono font-bold',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }, fmtUAH(totals.pdfo)),
            // ВЗ ₴
            h('td', { className: 'px-3 py-3 text-right font-mono font-bold',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }, fmtUAH(totals.vz)),
            // Всього податку
            h('td', { className: 'px-3 py-3 text-right font-mono font-bold',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)', color: 'var(--warn)' }
            }, fmtUAH(totals.tax)),
            // Чистий дохід
            h('td', { className: 'px-3 py-3 text-right font-mono font-bold',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)', color: 'var(--pos)' }
            }, fmtUAH(totals.net)),
          )
        )
      )
    ),

    // Легенда: пояснення колонок таблиці
    h('div', { className: 'card mt-4', style: { overflow: 'hidden' } },
      h('button', {
        onClick: () => setLegendOpen(!legendOpen),
        className: 'w-full px-4 py-3 flex items-center justify-between text-left',
        style: {
          background: 'transparent',
          border: 'none',
          cursor: 'pointer',
          color: 'var(--text-secondary)',
        },
        onMouseEnter: (e) => { e.currentTarget.style.background = 'var(--bg-panel-2)'; },
        onMouseLeave: (e) => { e.currentTarget.style.background = 'transparent'; },
      },
        h('span', { className: 'text-sm font-medium flex items-center gap-2' },
          h('span', { style: { fontSize: 11 } }, legendOpen ? '▼' : '▶'),
          'ℹ Про колонки таблиці'
        ),
        h('span', { className: 'text-xs t-text-tertiary' },
          legendOpen ? 'приховати' : 'показати')
      ),
      legendOpen && h('div', {
        className: 'px-5 py-4',
        style: { borderTop: '1px solid var(--border-subtle)' }
      },
        h('div', { className: 'grid md:grid-cols-2 gap-x-8 gap-y-3 text-xs' },
          [
            ['Акаунт', 'Номер рахунку IBKR, на який надійшла виплата.'],
            ['Тикер', 'Символ фонду або акції. Бейдж ROC (жовтий) біля тикера означає що у виплаті була реверсія частини утримання.'],
            ['Дата', 'Дата виплати дивіденду (pay date). Визначає курс НБУ та ставку військового збору для цієї виплати.'],
            ['Gross cur', 'Нарахована сума дивіденду у валюті виплати — до будь-яких утримань. Це база для розрахунку українських податків.'],
            ['WHT cur', 'US Withholding Tax — податок 15%, утриманий у США за формою W-8BEN. Показана ПОВНА сума утримання у валюті.'],
            ['ROC', 'Return of Capital — повернення капіталу. Фонди NEOS/Goldman (QQQI, SPYI, GPIX) та деякі ETF (DIVO, AGG) періодично перекласифікують частину виплати як повернення капіталу. У США це реверсує утриманий податок. Не впливає на базу в Україні, показується як бонусний cashflow.'],
            ['Net cur', 'Фактично отримано на рахунок у валюті: Gross − повне WHT + ROC.'],
            ['Курс', 'Офіційний курс НБУ на дату виплати. Якщо виплата припала на вихідний/свято — використовується курс попереднього робочого дня.'],
            ['Gross ₴', 'Gross у гривневому еквіваленті. Це і є база оподаткування в Україні.'],
            ['ПДФО ₴', '9% податок на доходи фізосіб. Для іноземних дивідендів резидентів України — ст. 170.11.1 ПКУ.'],
            ['ВЗ ₴', 'Військовий збір: 1,5% для доходів по 31.12.2024 включно, 5% для доходів з 01.01.2025. Ставка визначається автоматично за датою виплати.'],
            ['Всього податку', 'Сума ПДФО + ВЗ до сплати в Україні з цієї виплати.'],
            ['Чистий дохід', 'Реальний cashflow на руках: Gross − US WHT + ROC − українські податки.'],
          ].map(([name, desc]) =>
            h('div', { key: name, className: 'flex gap-3' },
              h('div', {
                className: 'font-mono font-medium flex-shrink-0',
                style: { minWidth: 110, color: 'var(--accent)' }
              }, name),
              h('div', { className: 't-text-secondary' }, desc)
            )
          )
        )
      )
    )
  );
}

// SECTION: TAB_TRADES
// ═══════════════════════════════════════════════════════════

function TradesTab({ agg, settings }) {
  const [filterAccount, setFilterAccount] = useState('all');
  const [filterSymbol, setFilterSymbol] = useState('all');
  // Set з ключами згорнутих груп. За замовчуванням — всі згорнуті.
  const [collapsed, setCollapsed] = useState(() => new Set());
  const seenKeysRef = useRef(new Set());

  if (!agg) return h('div', { className: 't-text-tertiary' }, 'Немає даних.');

  const accounts = Array.from(new Set(agg.trades.map(t => t.accountId)));
  const symbols = Array.from(new Set(agg.trades.map(t => t.symbol))).sort();

  const filtered = agg.trades.filter(t => {
    if (filterAccount !== 'all' && t.accountId !== filterAccount) return false;
    if (filterSymbol !== 'all' && t.symbol !== filterSymbol) return false;
    return true;
  });

  const grouped = {};
  filtered.forEach(t => {
    const key = `${t.accountId}||${t.symbol}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(t);
  });
  const keys = Object.keys(grouped).sort();

  // Нові групи (яких ще не бачили) — автоматично додаємо до collapsed
  useEffect(() => {
    const newlyCollapsed = [];
    keys.forEach(k => {
      if (!seenKeysRef.current.has(k)) {
        seenKeysRef.current.add(k);
        newlyCollapsed.push(k);
      }
    });
    if (newlyCollapsed.length > 0) {
      setCollapsed(prev => {
        const next = new Set(prev);
        newlyCollapsed.forEach(k => next.add(k));
        return next;
      });
    }
  }, [keys.join('|')]);

  const toggleGroup = (key) => {
    setCollapsed(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key);
      else next.add(key);
      return next;
    });
  };

  const isFullView = filterAccount === 'all' && filterSymbol === 'all';

  const totalsBase = filtered.reduce((acc, t) => ({
    costUSD: acc.costUSD + t.costUSD, proceedsUSD: acc.proceedsUSD + t.proceedsUSD,
    costUAH: acc.costUAH + t.costBasisUAH, proceedsUAH: acc.proceedsUAH + t.proceedsUAH,
    pnlUSD: acc.pnlUSD + t.pnlUSD, pnlUAH: acc.pnlUAH + t.pnlUAH,
    profit: acc.profit + (t.pnlUAH > 0 ? t.pnlUAH : 0),
    loss: acc.loss + (t.pnlUAH < 0 ? t.pnlUAH : 0),
  }), { costUSD: 0, proceedsUSD: 0, costUAH: 0, proceedsUAH: 0, pnlUSD: 0, pnlUAH: 0, profit: 0, loss: 0 });

  let tax, pdfo, vz;
  if (isFullView) {
    tax = agg.totals.tradesTaxUAH;
    pdfo = agg.totals.tradesPdfoUAH;
    vz = agg.totals.tradesVzUAH;
  } else {
    const taxable = Math.max(0, totalsBase.pnlUAH);
    const vzR = getVzRateForYear(agg.reportYear);
    pdfo = taxable * 0.18; vz = taxable * vzR; tax = pdfo + vz;
  }
  const totals = { ...totalsBase, pdfo, vz, tax };

  return h('div', null,
    h('div', { className: 'mb-5 flex items-center gap-6 flex-wrap' },
      h('div', null,
        h('span', { className: 'text-xs t-text-tertiary mr-2' }, 'Акаунт:'),
        h('select', { value: filterAccount, onChange: (e) => setFilterAccount(e.target.value) },
          h('option', { value: 'all' }, 'Всі'),
          accounts.map(a => h('option', { key: a, value: a }, a))
        )
      ),
      h('div', null,
        h('span', { className: 'text-xs t-text-tertiary mr-2' }, 'Тикер:'),
        h('select', { value: filterSymbol, onChange: (e) => setFilterSymbol(e.target.value), style: { fontFamily: 'JetBrains Mono, monospace' } },
          h('option', { value: 'all' }, 'Всі'),
          symbols.map(s => h('option', { key: s, value: s }, s))
        )
      ),
      h('button', {
        onClick: () => {
          const allCollapsed = keys.every(k => collapsed.has(k));
          setCollapsed(allCollapsed ? new Set() : new Set(keys));
        },
        className: 'px-2.5 py-1 text-xs rounded-md transition-all',
        style: {
          background: 'var(--bg-panel-2)',
          color: 'var(--text-secondary)',
          border: '1px solid var(--border-subtle)',
        },
        onMouseEnter: (e) => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; },
        onMouseLeave: (e) => { e.currentTarget.style.color = 'var(--text-secondary)'; e.currentTarget.style.borderColor = 'var(--border-subtle)'; },
      },
        keys.length > 0 && keys.every(k => collapsed.has(k)) ? '▼ Розгорнути все' : '▶ Згорнути все'
      ),
      h('div', { className: 'ml-auto text-xs t-text-tertiary' },
        `${filtered.length} з ${agg.trades.length} лотів`)
    ),

    h('div', {
      className: 'card',
      style: {
        maxHeight: '70vh',
        overflow: 'auto',
        position: 'relative',
      }
    },
      h('table', { className: 'w-full text-sm', style: { borderCollapse: 'separate', borderSpacing: 0 } },
        h('thead', null,
          h('tr', null,
            ['Акаунт', 'Тикер', 'Відкр.', 'Qty', 'Ціна відкр.', 'Cost cur', 'Курс₁', 'Cost ₴',
             'Закр.', 'Ціна закр.', 'Proceeds cur', 'Курс₂', 'Proceeds ₴', 'P&L cur', 'P&L ₴']
              .map((c, i) =>
                h('th', { key: i,
                  className: `px-2.5 py-2.5 text-xs font-medium uppercase tracking-wider t-text-tertiary whitespace-nowrap ${i >= 3 ? 'text-right' : 'text-left'}`,
                  style: {
                    position: 'sticky',
                    top: 0,
                    zIndex: 10,
                    background: 'var(--bg-table-header)',
                    borderBottom: '1px solid var(--border)',
                  }
                }, c)
              )
          )
        ),
        h('tbody', null,
          keys.flatMap(key => {
            const rows = grouped[key];
            const [accId, sym] = key.split('||');
            const subtot = rows.reduce((acc, t) => ({
              pnlUSD: acc.pnlUSD + t.pnlUSD, pnlUAH: acc.pnlUAH + t.pnlUAH,
              cost: acc.cost + t.costBasisUAH, proc: acc.proc + t.proceedsUAH,
            }), { pnlUSD: 0, pnlUAH: 0, cost: 0, proc: 0 });
            const isCollapsed = collapsed.has(key);
            return [
              h('tr', { key: `h_${key}`, style: { borderBottom: '1px solid var(--border-subtle)' } },
                h('td', {
                  colSpan: 15,
                  className: 'px-3 py-1.5 text-xs font-medium cursor-pointer select-none',
                  style: { color: 'var(--accent)', background: 'var(--bg-group-header)' },
                  onClick: () => toggleGroup(key)
                },
                  h('span', { style: { display: 'inline-block', width: 14, textAlign: 'center', fontSize: 9 } },
                    isCollapsed ? '▶' : '▼'),
                  `  ${accId}  •  ${sym}  `,
                  h('span', { className: 't-text-tertiary' }, `(${rows.length} лотів)`)
                )
              ),
              ...(isCollapsed ? [] : rows.map((t, i) => {
                const cur = t.currency || 'USD';
                return h('tr', { key: `r_${key}_${i}_${t.transactionID || ''}_${t.qty || 0}`,
                  className: 'data-row whitespace-nowrap',
                  style: { borderBottom: '1px solid var(--border-subtle)' } },
                  // Акаунт
                  h('td', { className: 'px-2.5 py-2 t-text-tertiary text-xs' }, t.accountId),
                  // Тикер
                  h('td', { className: 'px-2.5 py-2 font-mono font-medium text-sm' }, t.symbol),
                  // Відкр. (дата)
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs t-text-tertiary' },
                    fmtDateDDMMYY(t.openDate)),
                  // Qty
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs' }, fmtNum(t.qty, 4)),
                  // Ціна відкр.
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs' }, fmtCur(t.priceOpenUSD, cur)),
                  // Cost cur
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs' }, fmtCur(t.costUSD, cur)),
                  // Курс₁
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs t-text-tertiary' },
                    t.openRate ? fmtNum(t.openRate, 3) : '—'),
                  // Cost ₴
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs t-text-tertiary' }, fmtUAH(t.costBasisUAH)),
                  // Закр. (дата)
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs t-text-tertiary' },
                    fmtDateDDMMYY(t.closeDate)),
                  // Ціна закр.
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs' }, fmtCur(t.priceCloseUSD, cur)),
                  // Proceeds cur
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs' }, fmtCur(t.proceedsUSD, cur)),
                  // Курс₂
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs t-text-tertiary' },
                    t.closeRate ? fmtNum(t.closeRate, 3) : '—'),
                  // Proceeds ₴
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs t-text-tertiary' }, fmtUAH(t.proceedsUAH)),
                  // P&L cur
                  h('td', { className: 'px-2.5 py-2 text-right font-mono text-xs',
                    style: { color: t.pnlUSD >= 0 ? 'var(--pos)' : 'var(--neg)' } },
                    fmtCur(t.pnlUSD, cur)),
                  // P&L ₴
                  h('td', { className: 'px-2.5 py-2 text-right font-mono',
                    style: { color: t.pnlUAH >= 0 ? 'var(--pos)' : 'var(--neg)' } },
                    fmtUAH(t.pnlUAH)),
                );
              })),
              h('tr', { key: `s_${key}`, className: 'font-medium',
                style: { borderBottom: '1px solid var(--border)', background: 'var(--bg-group-header)' } },
                // Акаунт, Тикер, Відкр., Qty, Ціна відкр. → лейбл
                h('td', { colSpan: 5, className: 'px-3 py-2 text-right text-xs t-text-secondary' }, `Разом по ${sym}:`),
                // Cost cur
                h('td', { className: 'px-2.5 py-2 text-right font-mono text-sm' },
                  fmtCur(rows.reduce((s, r) => s + r.costUSD, 0), rows[0]?.currency || 'USD')),
                // Курс₁ — порожній
                h('td'),
                // Cost ₴
                h('td', { className: 'px-2.5 py-2 text-right font-mono text-sm t-text-secondary' }, fmtUAH(subtot.cost)),
                // Закр., Ціна закр. — порожні
                h('td', { colSpan: 2 }),
                // Proceeds cur
                h('td', { className: 'px-2.5 py-2 text-right font-mono text-sm' },
                  fmtCur(rows.reduce((s, r) => s + r.proceedsUSD, 0), rows[0]?.currency || 'USD')),
                // Курс₂ — порожній
                h('td'),
                // Proceeds ₴
                h('td', { className: 'px-2.5 py-2 text-right font-mono text-sm t-text-secondary' }, fmtUAH(subtot.proc)),
                // P&L cur
                h('td', { className: 'px-2.5 py-2 text-right font-mono text-sm',
                  style: { color: subtot.pnlUSD >= 0 ? 'var(--pos)' : 'var(--neg)' } },
                  fmtCur(subtot.pnlUSD, rows[0]?.currency || 'USD')),
                // P&L ₴
                h('td', { className: 'px-2.5 py-2 text-right font-mono text-sm',
                  style: { color: subtot.pnlUAH >= 0 ? 'var(--pos)' : 'var(--neg)' } },
                  fmtUAH(subtot.pnlUAH)),
              )
            ];
          })
        ),
        h('tfoot', null,
          h('tr', null,
            // ВСЬОГО (₴): охоплює Акаунт, Тикер, Відкр., Qty, Ціна відкр., Cost cur, Курс₁
            h('td', { colSpan: 7, className: 'px-3 py-3 text-sm font-semibold text-right uppercase tracking-wider',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }, 'ВСЬОГО (₴):'),
            // Cost ₴
            h('td', { className: 'px-2.5 py-3 text-right font-mono font-bold',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }, fmtUAH(totals.costUAH)),
            // Закр., Ціна закр., Proceeds cur, Курс₂ — порожні
            h('td', { colSpan: 4,
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }),
            // Proceeds ₴
            h('td', { className: 'px-2.5 py-3 text-right font-mono font-bold',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }, fmtUAH(totals.proceedsUAH)),
            // P&L cur — порожньо (різні валюти)
            h('td', {
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)' }
            }),
            // P&L ₴
            h('td', { className: 'px-2.5 py-3 text-right font-mono font-bold',
              style: { position: 'sticky', bottom: 0, background: 'var(--bg-group-header)', borderTop: '1px solid var(--border)', color: totals.pnlUAH >= 0 ? 'var(--pos)' : 'var(--neg)' }
            }, fmtUAH(totals.pnlUAH)),
          )
        )
      )
    ),

    totals.loss < 0 && h('div', {
      className: 'mt-4 p-4 rounded-lg text-sm card',
      style: { background: 'var(--accent-bg)', borderColor: 'var(--accent)' }
    },
      h('span', { className: 'font-medium', style: { color: 'var(--accent)' } }, 'Примітка: '),
      h('span', { className: 't-text-primary' },
        `Збитки ${fmtUAH(Math.abs(totals.loss))} можна перенести на наступні податкові періоди для зменшення майбутнього інвестприбутку (п. 170.2.6 ПКУ).`)
    )
  );
}

// ═══════════════════════════════════════════════════════════
// SECTION: APP (root)
// ═══════════════════════════════════════════════════════════

function App() {
  // Theme state
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('ibkr-tax-ua:theme') || 'dark'; } catch { return 'dark'; }
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('ibkr-tax-ua:theme', theme); } catch {}
  }, [theme]);

  const [tab, setTab] = useState('upload');
  const [xmlText, setXmlText] = useState(null);
  const [parseError, setParseError] = useState(null);
  const [loadingStatus, setLoadingStatus] = useState(null);
  const [loadingStatusKind, setLoadingStatusKind] = useState('info'); // 'info' | 'error'
  const [rateMap, setRateMap] = useState(new Map());
  const [rateDiagnostics, setRateDiagnostics] = useState(null);

  const [settings, setSettings] = useState(() => {
    try {
      const saved = localStorage.getItem('ibkr-tax-ua:settings');
      if (saved) return JSON.parse(saved);
    } catch {}
    return { usWhtMode: 'conservative', reportYear: null, priorLossUAH: 0 };
  });
  useEffect(() => {
    try { localStorage.setItem('ibkr-tax-ua:settings', JSON.stringify(settings)); } catch {}
  }, [settings]);

  const parsed = useMemo(() => {
    if (!xmlText) return null;
    try {
      setParseError(null);
      return parseIBKRXml(xmlText);
    } catch (e) {
      setParseError(e.message);
      return null;
    }
  }, [xmlText]);

  const classified = useMemo(() => parsed ? classifyTransactions(parsed) : null, [parsed]);

  // Extract report date range from parsed accounts AND actual operation dates
  const reportDateRange = useMemo(() => {
    if (!parsed) return null;
    const froms = parsed.accounts.map(a => a.fromDate).filter(Boolean);
    const tos = parsed.accounts.map(a => a.toDate).filter(Boolean);
    if (!froms.length || !tos.length) return null;
    return { from: froms.sort()[0], to: tos.sort()[tos.length - 1] };
  }, [parsed]);

  // Визначаємо МІНІМАЛЬНУ дату з усіх операцій (бо лот може бути відкритий раніше fromDate)
  const rateLoadRange = useMemo(() => {
    if (!classified || !reportDateRange) return null;
    let minDate = reportDateRange.from;
    let maxDate = reportDateRange.to;
    classified.accounts.forEach((acc) => {
      acc.classified.dividends.forEach((d) => {
        const k = d.settleDateISO || d.dateTimeISO;
        if (k && k < minDate) minDate = k;
        if (k && k > maxDate) maxDate = k;
      });
      acc.classified.trades.forEach((lot) => {
        [lot.tradeDateISO, lot.openDateTimeISO].forEach((k) => {
          if (k && k < minDate) minDate = k;
          if (k && k > maxDate) maxDate = k;
        });
      });
    });
    return { from: minDate, to: maxDate };
  }, [classified, reportDateRange]);

  // Валюти у звіті (для автозавантаження)
  const reportCurrencies = useMemo(() => {
    if (!classified) return [];
    const set = new Set();
    classified.accounts.forEach((acc) => {
      acc.classified.dividends.forEach((d) => d.currency && set.add(d.currency));
      acc.classified.trades.forEach((l) => l.currency && set.add(l.currency));
    });
    return Array.from(set).filter((c) => c !== 'UAH').sort();
  }, [classified]);

  // Роки з операцій (для dropdown "Звітний рік")
  const reportYears = useMemo(() => {
    if (!classified) return [];
    const set = new Set();
    classified.accounts.forEach((acc) => {
      acc.classified.dividends.forEach((d) => {
        const k = d.settleDateISO || d.dateTimeISO;
        if (k) set.add(k.slice(0, 4));
      });
      acc.classified.trades.forEach((l) => {
        if (l.tradeDateISO) set.add(l.tradeDateISO.slice(0, 4));
      });
    });
    return Array.from(set).sort();
  }, [classified]);

  const [cacheCoverage, setCacheCoverage] = useState({});
  useEffect(() => {
    (async () => setCacheCoverage(await getCacheCoverage()))();
  }, []);

  // Auto-fetch rates — per-day CORS-friendly, batched, cache-first
  useEffect(() => {
    if (!classified || !rateLoadRange) return;
    (async () => {
      const currencies = Array.from(new Set(['USD', 'EUR', ...reportCurrencies]));
      setLoadingStatusKind('info');
      setLoadingStatus(`Завантаження курсів НБУ за період ${fmtDateDDMMYYYY(rateLoadRange.from)} — ${fmtDateDDMMYYYY(rateLoadRange.to)}…`);
      try {
        const { flat, diagnostics } = await bulkLoadRates(
          currencies, rateLoadRange.from, rateLoadRange.to,
          (ccy, doneInCur, totalInCur, curIdx, totalCur) => {
            const progress = totalInCur > 0 ? ` (${doneInCur}/${totalInCur} днів)` : '';
            setLoadingStatus(`Курси НБУ: ${ccy}${progress} · валюта ${curIdx}/${totalCur}`);
          }
        );
        setRateMap(flat);
        setRateDiagnostics(diagnostics);
        setCacheCoverage(await getCacheCoverage());

        if (flat.size === 0) {
          setLoadingStatusKind('error');
          setLoadingStatus(`✗ Не вдалося завантажити жодного курсу НБУ. Перевірте з'єднання з bank.gov.ua.`);
        } else if (diagnostics.anyError) {
          setLoadingStatusKind('error');
          const failures = Object.entries(diagnostics.byCurrency)
            .filter(([, v]) => v.failed > 0 || v.failed === -1)
            .map(([c, v]) => `${c}: ${v.failed === -1 ? 'помилка' : v.failed + ' днів відсутні'}`)
            .join(', ');
          setLoadingStatus(`⚠ Завантажено ${flat.size} курсів, але деякі дні відсутні: ${failures}. Гривневі еквіваленти можуть бути неточними.`);
        } else {
          setLoadingStatus(`✓ Завантажено ${flat.size} курсів НБУ (${currencies.join(', ')})`);
          setTimeout(() => setLoadingStatus(null), 2500);
        }
      } catch (e) {
        setLoadingStatusKind('error');
        setLoadingStatus(`✗ Помилка завантаження курсів: ${e.message}`);
      }
    })();
  }, [classified, rateLoadRange, reportCurrencies]);

  const calcResult = useMemo(() => {
    if (!classified || rateMap.size === 0) return null;
    return calculateAll(classified, rateMap, settings);
  }, [classified, rateMap, settings]);

  const agg = useMemo(() => {
    if (!calcResult) return null;
    return buildAggregates(calcResult, settings);
  }, [calcResult, settings.reportYear, settings.priorLossUAH]);

  const handleFileLoaded = (text, err) => {
    if (err) {
      setParseError(err); setXmlText(null); return;
    }
    setXmlText(text); setParseError(null);
    // Прибрано авто-перехід — користувач сам вирішує коли перейти на Dashboard
  };

  const handleClearCache = async () => {
    await clearRateCache();
    setRateMap(new Map());
    setCacheCoverage({});
    setLoadingStatusKind('info');
    setLoadingStatus('Кеш очищено. Перезавантажте XML, щоб оновити курси.');
    setTimeout(() => setLoadingStatus(null), 3000);
  };

  const divCount = agg?.divs.length || 0;
  const tradeCount = agg?.trades.length || 0;

  const tabs = [
    { id: 'upload', label: 'Upload' },
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'dividends', label: 'Дивіденди', badge: divCount || null },
    { id: 'trades', label: 'Угоди', badge: tradeCount || null },
    { id: 'summary', label: 'Підсумок' },
  ];

  return h('div', { className: 'min-h-screen relative' },
    h('header', {
      className: 'sticky top-0 z-20 backdrop-blur-md',
      style: { background: 'var(--bg-overlay)', borderBottom: '1px solid var(--border-subtle)' }
    },
      h('div', { className: 'max-w-7xl mx-auto px-6 py-3.5 flex items-center justify-between gap-6 flex-wrap' },
        h('div', { className: 'flex items-center gap-3' },
          h('div', {
            className: 'w-8 h-8 rounded-lg flex items-center justify-center font-mono font-bold text-sm',
            style: { background: 'linear-gradient(135deg, var(--accent), var(--pos))', color: '#fff' }
          }, '₴'),
          h('div', null,
            h('div', { className: 'font-semibold tracking-tight' }, 'ProfitTax UA'),
            h('div', { className: 'text-[10px] uppercase tracking-wider t-text-tertiary' },
              'Інвестиційні результати і розрахунок податків для резидента України')
          )
        ),
        h('div', { className: 'flex items-center gap-2' },
          h('nav', { className: 'flex items-center gap-1' },
            tabs.map(t =>
              h(TabButton, { key: t.id, active: tab === t.id, onClick: () => setTab(t.id), badge: t.badge }, t.label)
            )
          ),
          h('div', { className: 'ml-2' }, h(ThemeToggle, { theme, setTheme }))
        )
      )
    ),

    h('main', { className: 'relative z-10 max-w-7xl mx-auto px-6 py-8' },
      // Глобальний banner: курси НБУ відсутні (видно на всіх вкладках, крім Upload)
      tab !== 'upload' && xmlText && rateMap.size === 0 && h('div', {
        className: 'mb-5 rounded-lg p-4 text-sm',
        style: { background: 'var(--neg-bg)', color: 'var(--neg)', border: '1px solid var(--neg)' }
      },
        h('div', { className: 'font-medium mb-1' }, '⚠ Курси НБУ відсутні'),
        h('div', { className: 'text-xs' },
          'Гривневі еквіваленти не розраховані. Перевірте з\'єднання з bank.gov.ua або перезавантажте XML на вкладці Upload.')
      ),
      // Попередження: курси частково відсутні (є diagnostics з failed > 0)
      tab !== 'upload' && xmlText && rateMap.size > 0 && rateDiagnostics?.anyError && h('div', {
        className: 'mb-5 rounded-lg p-4 text-sm',
        style: { background: 'var(--warn-bg)', color: 'var(--warn)', border: '1px solid var(--warn)' }
      },
        h('div', { className: 'font-medium mb-1' }, '⚠ Деякі курси НБУ не завантажилися'),
        h('div', { className: 'text-xs' },
          Object.entries(rateDiagnostics.byCurrency)
            .filter(([, v]) => v.failed > 0 || v.failed === -1)
            .map(([c, v]) => `${c}: ${v.failed === -1 ? 'помилка запиту' : v.failed + ' днів відсутні'}`)
            .join(' · '),
          ' — гривневі еквіваленти для цих дат можуть бути неточними або рахуватись з попереднього робочого дня.'
        )
      ),

      tab === 'upload' && h(UploadTab, {
        onFileLoaded: handleFileLoaded,
        parseError, xmlLoaded: !!xmlText,
        loadingStatus, loadingStatusKind,
        onClearCache: handleClearCache,
        settings, setSettings,
        reportDateRange, reportYears,
        cacheCoverage, reportCurrencies,
      }),
      tab === 'dashboard' && h(DashboardTab, { agg, settings, rateMap, rateLoadRange }),
      tab === 'dividends' && h(DividendsTab, { agg }),
      tab === 'trades' && h(TradesTab, { agg, settings }),
      tab === 'summary' && h(TaxSummaryTab, { agg, settings }),
    ),

    h('footer', { className: 'max-w-7xl mx-auto px-6 py-8 text-xs t-text-tertiary',
      style: { borderTop: '1px solid var(--border-subtle)' } },
      h('div', null, 'v0.3.15 · ProfitTax UA · Yavo Max 2026 (c) · Created with Claude.ai · BETA TESTING')
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
